<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇨🇿 CZ Spot Ceny · DA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #1a1a2e;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; font-family: 'JetBrains Mono', monospace; }
  .refresh { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  button { background: #1a1a2e; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; cursor: pointer; }
  button:hover { background: #2c2c40; }
  
  .row {
    display: grid;
    grid-template-columns: 50px 1fr 100px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #1a1a2e;
    font-family: 'JetBrains Mono', monospace;
  }
  .row.current { background: #1a1a2e; color: #fff; font-weight: 700; border: 2px solid #1a1a2e; }
  .row .label { font-weight: 700; font-size: 15px; }
  .row .time { font-size: 13px; color: #666; text-align: center; }
  .row.current .time { color: #d0d0d8; }
  .row .price { text-align: right; font-weight: 700; font-size: 18px; }
  
  .header-row {
    display: grid;
    grid-template-columns: 50px 1fr 100px;
    padding: 8px 12px;
    background: #fff;
    border-bottom: 2px solid #1a1a2e;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #666;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-row .price-label { text-align: right; }
  .header-row .time-label { text-align: center; }
  
  .err { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin: 10px 0; font-size: 12px; display: none; }
  .err.show { display: block; }
  .loading { text-align: center; color: #999; padding: 30px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
</style>
</head>
<body>

<h1>🇨🇿 CZ Spot Ceny</h1>
<div class="subtitle">Day-Ahead trh · EUR/MWh · OTE</div>

<div class="refresh">
  <span id="meta" style="font-size:11px;color:#999;font-family:'JetBrains Mono',monospace;"></span>
  <button onclick="loadPrices()">↻ Aktualizovat</button>
</div>

<div id="err" class="err"></div>

<div class="header-row">
  <span>H</span>
  <span class="time-label">Čas</span>
  <span class="price-label">€/MWh</span>
</div>

<div id="rows">
  <div class="loading">Načítám ceny…</div>
</div>

<script>
const API_URL = window.location.origin;

async function loadPrices() {
  const errEl = document.getElementById('err');
  errEl.classList.remove('show');
  
  try {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const today = `${yyyy}-${mm}-${dd}`;
    
    const res = await fetch(`${API_URL}/ote/spot?date=${today}&country=CZ`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    const rows = data.rows || data.data || [];
    if (!rows.length) {
      errEl.textContent = 'Žádná data pro dnešní den';
      errEl.classList.add('show');
      document.getElementById('rows').innerHTML = '';
      return;
    }
    
    const priceByHour = {};
    for (const row of rows) {
      const h = row.hour !== undefined ? row.hour : null;
      if (h === null) continue;
      const p = row.price_eur !== undefined ? row.price_eur : row.price;
      if (p === undefined || p === null) continue;
      priceByHour[h] = parseFloat(p);
    }
    
    const curHour = now.getHours() + 1;
    
    let html = '';
    for (let h = 1; h <= 24; h++) {
      const dataH = h - 1;
      const isCur = h === curHour;
      const rowClass = isCur ? 'row current' : 'row';
      
      const startH = String(h - 1).padStart(2, '0');
      const endH = String(h).padStart(2, '0');
      const timeStr = `${startH}:00–${endH}:00`;
      
      let priceStr = '—';
      if (dataH in priceByHour) {
        const p = priceByHour[dataH];
        priceStr = (Math.round(p * 10) / 10).toFixed(1);
      }
      
      html += `<div class="${rowClass}">
        <span class="label">H${String(h).padStart(2, '0')}</span>
        <span class="time">${timeStr}</span>
        <span class="price">${priceStr}</span>
      </div>`;
    }
    document.getElementById('rows').innerHTML = html;
    
    const nowStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('meta').textContent = `${today} · ${nowStr}`;
    
  } catch (e) {
    console.error(e);
    errEl.textContent = `Chyba: ${e.message}`;
    errEl.classList.add('show');
  }
}

loadPrices();
setInterval(loadPrices, 300000);
</script>
</body>
</html>
