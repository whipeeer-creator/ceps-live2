<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>EISI-NEW v2 · CEPS + Backtest 30d</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Inter', sans-serif; background:#f4f5f9; color:#1a1a2e; padding:15px; max-width:1300px; margin:auto; }
h1 { color:#0d47a1; }
.card { background:#fff; border:1px solid #ddd; border-radius:8px; padding:14px; margin-bottom:12px; }
.big { font-size:32px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.green { color:#2e7d32; }
.red { color:#c62828; }
table { width:100%; border-collapse:collapse; font-size:11.5px; font-family:'JetBrains Mono',monospace; background:white; }
th, td { padding:6px 8px; text-align:right; border-top:1px solid #eee; }
th { background:#f8f9fc; }
.refresh { padding:8px 16px; background:#1565c0; color:white; border:none; border-radius:6px; cursor:pointer; }
button { margin:5px; }
</style>
</head>
<body>

<h1>EISI-NEW v2 <small>· NET SPREAD (CEPS) + Pyramiding + 30d Backtest</small></h1>
<button onclick="loadAll()" class="refresh">↺ Live Refresh</button>
<button onclick="runBacktest()">📊 Backtest 30 dní</button>

<div class="card">
  <div style="font-size:11px;color:#666;margin-bottom:6px;">AKTUÁLNÍ SIGNÁL</div>
  <div class="big" id="signal">NAČÍTÁM...</div>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;">
  <div class="card"><div style="font-size:11px;color:#666;">EISI</div><div class="big" id="eisi">—</div></div>
  <div class="card"><div style="font-size:11px;color:#666;">Režim</div><div class="big" id="regime">—</div></div>
  <div class="card"><div style="font-size:11px;color:#666;">Pozice (Pyramiding)</div><div class="big" id="size">— MWh</div></div>
</div>

<h2>Posledních 8 QH</h2>
<table id="liveTable"><thead><tr><th>Interval</th><th>Odch. EUR</th><th>EISI</th><th>Režim</th><th>Signal</th></tr></thead><tbody></tbody></table>

<h2>Backtest 30 dní (Pyramiding)</h2>
<div class="card">
  <pre id="backtestResult" style="font-size:12px; max-height:400px; overflow:auto; background:#f8f9fc;"></pre>
</div>

<script>
const KURZ = 24.5;
const LAG = 3;

async function loadAll() {
  try {
    const now = new Date();
    const today = now.toISOString().slice(0,10);
    const yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0,10);

    const res = await fetch(`/api?method=OdhadovanaCenaOdchylky&dateFrom=\( {yesterday}T00:00:00&dateTo= \){today}T23:59:59&_=${Date.now()}`);
    const data = await res.json();
    const rows = data.rows || [];

    if (rows.length < 20) {
      document.getElementById('signal').innerHTML = `<span style="color:orange">NEDOSTATEK DAT</span>`;
      return;
    }

    const prices = rows.map(r => {
      const kc = parseFloat(r['Zúčtovací cena odchylky (Kč/MWh)'] || 0);
      return kc / KURZ;
    });

    const eisiVals = [], regimes = [];

    for (let i = 0; i < prices.length; i++) {
      if (i < 40) { eisiVals.push(0); regimes.push("WARMUP"); continue; }

      const slice = prices.slice(i-48, i);
      const mean = slice.reduce((a,b)=>a+b,0) / slice.length;
      const std = Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/slice.length) || 1;
      const zscore = (prices[i] - mean) / std;

      let val, regime;
      if (Math.abs(zscore) > 1.75) {
        val = -zscore * 9.5;
        regime = "SPIKE";
      } else {
        val = zscore * 7.2;
        regime = "TREND";
      }
      eisiVals.push(val);
      regimes.push(regime);
    }

    const lastIdx = eisiVals.length - 1;
    const lastEisi = eisiVals[lastIdx] || 0;
    const isLong = lastEisi > 25;
    const position = getPyramidSize(lastEisi);

    document.getElementById('signal').innerHTML = isLong ? 
      `<span class="green">LONG ▲</span>` : 
      `<span class="red">SHORT ▼</span>`;

    document.getElementById('eisi').innerHTML = `<span class="\( {isLong?'green':'red'}"> \){lastEisi.toFixed(1)}</span>`;
    document.getElementById('regime').textContent = regimes[lastIdx];
    document.getElementById('size').innerHTML = `<span class="\( {isLong?'green':'red'}"> \){position} MWh</span>`;

    // Live tabulka
    let html = '';
    for (let i = Math.max(0, prices.length-8); i < prices.length; i++) {
      const v = eisiVals[i];
      html += `<tr>
        <td>${rows[i]['Interval'] || '—'}</td>
        <td>${prices[i].toFixed(1)}</td>
        <td class="\( {v>0?'green':'red'}"> \){v.toFixed(1)}</td>
        <td>${regimes[i]}</td>
        <td>${v>25?'LONG':v<-25?'SHORT':'—'}</td>
      </tr>`;
    }
    document.querySelector('#liveTable tbody').innerHTML = html;

  } catch(e) {
    console.error(e);
  }
}

function getPyramidSize(eisi) {
  const abs = Math.abs(eisi);
  if (abs > 180) return 12;
  if (abs > 120) return 9;
  if (abs > 80) return 7;
  if (abs > 50) return 5;
  if (abs > 30) return 3;
  return 2;
}

// ==================== BACKTEST 30 DNÍ ====================
async function runBacktest() {
  const resultEl = document.getElementById('backtestResult');
  resultEl.textContent = "Stahuji data pro posledních 30 dní...\n";

  let totalPnL = 0;
  let trades = 0;
  let winningTrades = 0;
  let equity = 10000;
  let peak = 10000;
  let maxDD = 0;

  for (let d = 0; d < 30; d++) {
    const date = new Date();
    date.setDate(date.getDate() - d);
    const dateStr = date.toISOString().slice(0,10);

    try {
      const res = await fetch(`/api?method=OdhadovanaCenaOdchylky&dateFrom=\( {dateStr}T00:00:00&dateTo= \){dateStr}T23:59:59&_=${Date.now()}`);
      const data = await res.json();
      if (!data.rows || data.rows.length < 50) continue;

      const prices = data.rows.map(r => parseFloat(r['Zúčtovací cena odchylky (Kč/MWh)'] || 0) / KURZ);

      const eisiVals = [];
      for (let i = 0; i < prices.length; i++) {
        if (i < 40) { eisiVals.push(0); continue; }
        const slice = prices.slice(i-48, i);
        const mean = slice.reduce((a,b)=>a+b,0)/slice.length;
        const std = Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/slice.length) || 1;
        const z = (prices[i] - mean) / std;
        const val = Math.abs(z) > 1.75 ? -z * 9.5 : z * 7.2;
        eisiVals.push(val);
      }

      // Jednoduchý backtest s LAG a pyramidingem
      for (let i = LAG; i < prices.length - 1; i++) {
        const signal = eisiVals[i-LAG];
        if (Math.abs(signal) < 25) continue;

        const direction = signal > 0 ? 1 : -1;
        const mwh = getPyramidSize(signal);
        const pnl = direction * (prices[i+1] - prices[i]) * mwh;

        totalPnL += pnl;
        equity += pnl;
        trades++;
        if (pnl > 0) winningTrades++;

        if (equity > peak) peak = equity;
        const dd = ((peak - equity) / peak) * 100;
        if (dd > maxDD) maxDD = dd;
      }

      resultEl.textContent += `✓ ${dateStr} | ${prices.length} QH\n`;
    } catch(e) {
      resultEl.textContent += `✗ ${dateStr} - chyba\n`;
    }
  }

  const winrate = trades > 0 ? (winningTrades / trades * 100).toFixed(1) : 0;

  resultEl.textContent += `\n=== VÝSLEDEK 30 DNÍ ===\n`;
  resultEl.textContent += `Celkový PnL: ${totalPnL.toFixed(0)} EUR\n`;
  resultEl.textContent += `Počet obchodů: ${trades}\n`;
  resultEl.textContent += `Winrate: ${winrate}%\n`;
  resultEl.textContent += `Max Drawdown: ${maxDD.toFixed(1)}%\n`;
  resultEl.textContent += `Finální equity: ${equity.toFixed(0)} EUR\n`;
}

loadAll();
setInterval(loadAll, 45000);
</script>
</body>
</html>
