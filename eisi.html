<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>EISI-NEW v2 · NET SPREAD Strategy</title>
<style>
/* Stejný styl jako originál */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f4f5f9; color: #1a1a2e; padding: 14px; max-width: 1200px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; color: #0d47a1; font-weight: 700; }
h1 small { font-size: 11px; color: #888; font-weight: 400; font-family: 'JetBrains Mono', monospace; }
.card { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.card-l { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; font-weight: 600; }
.card-v { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1.2; }
.big { font-size: 30px; }
.green { color: #2e7d32; }
.red { color: #c62828; }
.signal-card { padding: 16px 18px; }
table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
th { background: #f4f5f9; padding: 6px 8px; text-align: right; }
td { padding: 5px 8px; border-top: 1px solid #f0f1f4; text-align: right; }
.refresh { background: #1565c0; color: white; border: none; padding: 6px 14px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>EISI-NEW v2 <small>· NET SPREAD Strategy</small></h1>
  <button onclick="loadAll()">↺ Refresh</button>
</header>

<div class="card signal-card">
  <div class="card-l">AKTUÁLNÍ SIGNÁL (EISI-NEW v2)</div>
  <div class="big" id="currentSignal">NAČÍTÁM...</div>
  <div id="currentSignalDetail"></div>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;">
  <div class="card">
    <div class="card-l">EISI Hodnota</div>
    <div class="big" id="eisiValue">—</div>
  </div>
  <div class="card">
    <div class="card-l">Režim</div>
    <div class="big" id="regime">—</div>
  </div>
  <div class="card">
    <div class="card-l">Doporučená velikost</div>
    <div class="big" id="positionSize">— MWh</div>
  </div>
</div>

<h2>Posledních 8 QH</h2>
<table>
  <thead>
    <tr>
      <th>Interval</th>
      <th>Odch EUR</th>
      <th>EISI</th>
      <th>Režim</th>
      <th>Signal</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const KURZ = 24.5;
const LAG = 3;

async function loadAll() {
  try {
    const now = new Date();
    const today = now.toISOString().slice(0,10);
    const yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0,10);

    const res = await fetch(`/api?method=OdhadovanaCenaOdchylky&dateFrom=\( {yesterday}T00:00:00&dateTo= \){today}T23:59:59&_=${Date.now()}`);
    const data = await res.json();
    const rows = data.rows || [];

    if (rows.length < 15) {
      document.getElementById('currentSignal').innerHTML = `<span style="color:orange">NEDOSTATEK DAT (${rows.length})</span>`;
      return;
    }

    const prices = rows.map(r => {
      const kc = parseFloat(r['Zúčtovací cena odchylky (Kč/MWh)'] || 0);
      return kc / KURZ;
    });

    // === EISI-NEW v2 ===
    const eisi = [];
    const regimes = [];

    for (let i = 0; i < prices.length; i++) {
      if (i < 40) {
        eisi.push(0);
        regimes.push("WARMUP");
        continue;
      }

      const slice = prices.slice(i-36, i);
      const mean = slice.reduce((a,b)=>a+b,0) / slice.length;
      const std = Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/slice.length) || 1;
      const zscore = (prices[i] - mean) / std;

      let val, regime;
      if (Math.abs(zscore) > 1.75) {
        val = -zscore * 9.5;
        regime = "SPIKE";
      } else {
        val = zscore * 7.2;
        regime = "TREND";
      }
      eisi.push(val);
      regimes.push(regime);
    }

    const lastIdx = eisi.length - 1;
    const lastEisi = eisi[lastIdx] || 0;
    const isLong = lastEisi > 25;
    const size = Math.min(12, Math.floor(Math.abs(lastEisi) / 45) + 2);

    // Zobrazení
    document.getElementById('currentSignal').innerHTML = isLong ? 
      `<span class="green">LONG ▲ EISI-NEW v2</span>` : 
      `<span class="red">SHORT ▼ EISI-NEW v2</span>`;

    document.getElementById('eisiValue').innerHTML = `<span class="\( {isLong?'green':'red'}"> \){lastEisi.toFixed(1)}</span>`;
    document.getElementById('regime').textContent = regimes[lastIdx];
    document.getElementById('positionSize').innerHTML = `<span class="\( {isLong?'green':'red'}"> \){size} MWh</span>`;

    // Tabulka
    let html = '';
    for (let i = Math.max(0, prices.length-8); i < prices.length; i++) {
      const v = eisi[i];
      html += `<tr>
        <td>${rows[i]['Interval'] || '—'}</td>
        <td>${prices[i].toFixed(1)}</td>
        <td class="\( {v>0?'green':'red'}"> \){v.toFixed(1)}</td>
        <td>${regimes[i]}</td>
        <td>${v>25?'LONG':v<-25?'SHORT':'—'}</td>
      </tr>`;
    }
    document.getElementById('tableBody').innerHTML = html;

  } catch(e) {
    console.error(e);
    document.getElementById('currentSignal').innerHTML = `<span style="color:red">CHYBA</span>`;
  }
}

loadAll();
setInterval(loadAll, 45000);
</script>
</body>
</html>
