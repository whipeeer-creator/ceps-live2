<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>EISI-NEW v2 · NET SPREAD</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Inter', sans-serif; background:#f4f5f9; color:#1a1a2e; padding:15px; }
h1 { color:#0d47a1; }
.card { background:white; border:1px solid #e0e4ef; border-radius:8px; padding:14px; margin:10px 0; }
.big { font-size:32px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.green { color:#2e7d32; }
.red { color:#c62828; }
</style>
</head>
<body>

<h1>EISI-NEW v2 Dashboard</h1>
<button onclick="loadAll()">↺ Refresh</button>

<div class="card">
  <div>Signál</div>
  <div class="big" id="signal">NAČÍTÁM...</div>
</div>

<div class="card">
  <div>EISI Hodnota</div>
  <div class="big" id="eisi">—</div>
</div>

<div class="card">
  <div>Velikost pozice</div>
  <div class="big" id="size">— MWh</div>
</div>

<table id="table" style="width:100%; margin-top:15px; font-family:monospace; font-size:11px;"></table>

<script>
async function loadAll() {
  try {
    const now = new Date();
    const today = now.toISOString().slice(0,10);
    const yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0,10);

    const [odchRes] = await Promise.all([
      fetch(`/api?method=OdhadovanaCenaOdchylky&dateFrom=\( {yesterday}T00:00:00&dateTo= \){today}T23:59:59&_=${Date.now()}`)
    ]);

    const odch = await odchRes.json();
    const rows = odch.rows || [];

    console.log(`Načteno ${rows.length} QH`);

    if (rows.length < 8) {
      document.getElementById('signal').innerHTML = `<span style="color:orange">NEDOSTATEK DAT (${rows.length})</span>`;
      return;
    }

    // Jednoduchý výpočet EISI pro demo
    const prices = rows.map(r => {
      const kc = parseFloat(r['Zúčtovací cena odchylky (Kč/MWh)'] || 0);
      return kc / 24.5;
    });

    const lastPrice = prices[prices.length-1];
    const lastEisi = lastPrice * 1.8;   // zjednodušený placeholder

    const isLong = lastEisi > 0;
    const size = Math.min(12, Math.floor(Math.abs(lastEisi)/45) + 3);

    document.getElementById('signal').innerHTML = isLong ? 
      `<span class="green">LONG ▲</span>` : 
      `<span class="red">SHORT ▼</span>`;

    document.getElementById('eisi').innerHTML = 
      `<span class="\( {isLong?'green':'red'}"> \){lastEisi.toFixed(0)}</span>`;

    document.getElementById('size').innerHTML = 
      `<span class="\( {isLong?'green':'red'}"> \){size} MWh</span>`;

  } catch(e) {
    console.error(e);
    document.getElementById('signal').textContent = "API CHYBA";
  }
}

loadAll();
setInterval(loadAll, 45000);
</script>
</body>
</html>
