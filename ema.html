<script>
const KURZ = 24.5;
const SS_PERIOD = 8;
const ALPHA_EMA = 2 / (SS_PERIOD + 1);
const LAG = 4;

// BACKTEST SETTINGS
let BT_MODE = 'flat';
let BT_PERIOD = 'today';
let _btRowsCache = null;
let _btRows30dCache = null;
let _bt30dEma = null;

function setBtMode(mode) {
  BT_MODE = mode;
  document.getElementById('btn-mode-flat').style.background = mode === 'flat' ? '#1565c0' : 'transparent';
  document.getElementById('btn-mode-flat').style.color = mode === 'flat' ? '#fff' : '#1a1a2e';
  document.getElementById('btn-mode-pyr').style.background = mode === 'pyr' ? '#1565c0' : 'transparent';
  document.getElementById('btn-mode-pyr').style.color = mode === 'pyr' ? '#fff' : '#1a1a2e';
  document.getElementById('backtestTitleMode').textContent = mode === 'flat' 
    ? '@ 1 MWh (NET spread Odch−VDT)'
    : '@ Pyramid 1-10 MWh';
  refreshBacktest();
}

function setBtPeriod(period) {
  BT_PERIOD = period;
  document.getElementById('btn-period-today').style.background = period === 'today' ? '#1565c0' : 'transparent';
  document.getElementById('btn-period-today').style.color = period === 'today' ? '#fff' : '#1a1a2e';
  document.getElementById('btn-period-30d').style.background = period === '30d' ? '#1565c0' : 'transparent';
  document.getElementById('btn-period-30d').style.color = period === '30d' ? '#fff' : '#1a1a2e';
  document.getElementById('bkProfitLabel').textContent = period === 'today' ? 'NET Profit dnes (LAG4)' : 'NET Profit 30 dní (LAG4)';
  
  if (period === '30d' && !_btRows30dCache) {
    load30DayBacktest();
  } else {
    refreshBacktest();
  }
}

function refreshBacktest() {
  if (BT_PERIOD === 'today' && _btRowsCache && window._lastEma) {
    renderBacktest(_btRowsCache, window._lastEma);
  } else if (BT_PERIOD === '30d' && _btRows30dCache && _bt30dEma) {
    renderBacktest(_btRows30dCache, _bt30dEma);
  }
}

// === POMOCNÉ FUNKCE ===
function isRecentQH(interval, nowMin) {
  const tm = interval.match(/^(\d{1,2}):(\d{2})/);
  if (!tm) return false;
  const endMin = parseInt(tm[1]) * 60 + parseInt(tm[2]) + 15;
  return (nowMin - endMin) < 30 && (nowMin - endMin) >= 0;
}

function calculateEMA(rows) {
  const prices = rows.map(r => r.odch);
  const ema = [];
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  for (let i = 0; i < prices.length; i++) {
    const isRecentZero = prices[i] === 0 && isRecentQH(rows[i].interval, nowMin);
    
    if (isRecentZero && ema.length > 0) {
      ema.push(ema[ema.length - 1]);
    } else if (ema.length === 0) {
      ema.push(prices[i]);
    } else {
      ema.push(ALPHA_EMA * prices[i] + (1 - ALPHA_EMA) * ema[ema.length - 1]);
    }
  }
  return ema;
}

function getPositionSize(sig) {
  const abs = Math.abs(sig);
  if (abs < 30) return 1;
  if (abs < 100) return 3;
  if (abs < 200) return 7;
  return 10;
}

// === HLAVNÍ NAČTENÍ ===
async function loadAll() {
  try {
    const nowLocal = new Date();
    const today = `\( {nowLocal.getFullYear()}- \){String(nowLocal.getMonth()+1).padStart(2,'0')}-${String(nowLocal.getDate()).padStart(2,'0')}`;
    const yesterdayLocal = new Date(nowLocal.getTime() - 86400000);
    const yesterday = `\( {yesterdayLocal.getFullYear()}- \){String(yesterdayLocal.getMonth()+1).padStart(2,'0')}-${String(yesterdayLocal.getDate()).padStart(2,'0')}`;
    
    const cb = Date.now();
    const [rOdchY, rVdtY, rOdch, rVdt] = await Promise.all([
      fetch(`\( {API_URL}/api?method=OdhadovanaCenaOdchylky&dateFrom= \){yesterday}T00:00:00&dateTo=\( {yesterday}T23:59:59&_= \){cb}`, { cache: 'no-store' }),
      fetch(`\( {API_URL}/ote/vdt?date= \){yesterday}&_=${cb}`, { cache: 'no-store' }),
      fetch(`\( {API_URL}/api?method=OdhadovanaCenaOdchylky&dateFrom= \){today}T00:00:00&dateTo=\( {today}T23:59:59&_= \){cb}`, { cache: 'no-store' }),
      fetch(`\( {API_URL}/ote/vdt?date= \){today}&_=${cb}`, { cache: 'no-store' })
    ]);

    const dOdchY = await rOdchY.json();
    const dVdtY = await rVdtY.json();
    const dOdch = await rOdch.json();
    const dVdt = await rVdt.json();

    if (!dOdch?.rows?.length) {
      document.getElementById('metaInfo').textContent = 'Žádná data pro dnešní den';
      return;
    }

    const vdtMap = {};
    const buildVdt = (data, datePrefix) => {
      const list = Array.isArray(data) ? data : (data?.data || []);
      for (const v of list) {
        const ts = v.timestamp || v.ts || '';
        const m = ts.match(/T(\d{2}):(\d{2})/);
        if (!m) continue;
        const hh = m[1], mm = parseInt(m[2]);
        let endMM = mm + 15, endHH = parseInt(hh);
        if (endMM >= 60) { endMM = 0; endHH++; }
        const interval = `\( {hh}: \){String(mm).padStart(2,'0')}-\( {String(endHH).padStart(2,'0')}: \){String(endMM).padStart(2,'0')}`;
        const price = parseFloat(v.last);
        if (!isNaN(price)) vdtMap[`\( {datePrefix}| \){interval}`] = price;
      }
    };
    buildVdt(dVdtY, yesterday);
    buildVdt(dVdt, today);

    const rows = [];

    // Včerejší data pro kontinuitu EMA
    if (dOdchY.rows) {
      for (const row of dOdchY.rows) {
        const kc = parseFloat(row['Estimated price [Kč/MWh]'] || 0);
        const interval = row['Interval'] || '';
        if (!interval) continue;
        rows.push({
          interval, date: yesterday, kc,
          odch: kc / KURZ,
          vdt: vdtMap[`\( {yesterday}| \){interval}`] ?? null,
          isToday: false
        });
      }
    }

    // Dnešní data
    const nowMin = nowLocal.getHours() * 60 + nowLocal.getMinutes();
    for (const row of dOdch.rows) {
      const kc = parseFloat(row['Estimated price [Kč/MWh]'] || 0);
      const interval = row['Interval'] || '';
      if (!interval) continue;

      const tm = interval.match(/^(\d{1,2}):(\d{2})/);
      if (!tm) continue;
      const qhEndMin = parseInt(tm[1])*60 + parseInt(tm[2]) + 15;
      if (qhEndMin > nowMin) continue;

      const odch = kc / KURZ;
      const vdt = vdtMap[`\( {today}| \){interval}`] ?? null;

      rows.push({
        date: today, interval, kc, odch, vdt,
        isToday: true
      });
    }

    const ema = calculateEMA(rows);

    const vdtCount = rows.filter(r => r.vdt !== null).length;
    document.getElementById('metaInfo').textContent = 
      `${rows.length} QH · VDT: \( {vdtCount}/ \){rows.length} · LAG\( {LAG} · EMA \){SS_PERIOD} · refresh ${new Date().toLocaleTimeString('cs-CZ')}`;

    renderCurrentSignal(rows, ema);
    renderEmaTable(rows, ema);
    renderBacktest(rows, ema);

    _btRowsCache = rows;
    window._lastEma = ema;

  } catch(e) {
    console.error(e);
    document.getElementById('metaInfo').textContent = '⚠ Chyba: ' + e.message;
  }
}

// === RENDER FUNKCE ===
function renderCurrentSignal(rows, ema) {
  const n = rows.length;
  if (n < 8) return;
  
  const sigIdx = n - 1;
  const sigEma = ema[sigIdx];

  // Live signál (záměrně zpožděný díky LAG logice v praxi)
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const minStart = nowMin + 40;
  let tradableStart = Math.ceil(minStart / 15) * 15;
  if (tradableStart >= 24*60) tradableStart -= 24*60;
  
  const thh = String(Math.floor(tradableStart / 60)).padStart(2,'0');
  const tmm = String(tradableStart % 60).padStart(2,'0');
  let endMin = tradableStart + 15;
  if (endMin >= 24*60) endMin -= 24*60;
  const ehh = String(Math.floor(endMin / 60)).padStart(2,'0');
  const emm = String(endMin % 60).padStart(2,'0');
  const tradableInterval = `\( {thh}: \){tmm}-\( {ehh}: \){emm}`;
  let leadMin = tradableStart - nowMin;
  if (leadMin < 0) leadMin += 24*60;

  let direction, dirColor, dirEx;
  if (sigEma > 0) {
    direction = 'LONG ▲';
    dirColor = 'green';
    dirEx = 'Deficit → KUP na VDT, drž do odchylky (ČEPS dotuje +)';
  } else if (sigEma < 0) {
    direction = 'SHORT ▼';
    dirColor = 'red';
    dirEx = 'Přebytek → PRODEJ na VDT, dorovnej v odchylce';
  } else {
    direction = '⏸ NEUTRAL';
    dirColor = 'gray';
    dirEx = 'EMA8 = 0 → žádný směr';
  }

  document.getElementById('currentSignal').innerHTML = 
    `<span class="\( {dirColor}"> \){direction}</span> <span style="font-size:14px;color:#666;">→ \( {tradableInterval} <span style="color:#999;font-size:11px;">(T+ \){leadMin}min)</span></span>`;
  document.getElementById('currentSignalDetail').innerHTML = dirEx;

  // Position sizing
  const absSig = Math.abs(sigEma);
  let recMwh = getPositionSize(sigEma);

  // ... zde zůstává tvůj původní kód pro zvýraznění sizing tabulek (longSizing / shortSizing)
  const longBands = [ /* tvůj původní longBands */ ];
  const shortBands = [ /* tvůj původní shortBands */ ];

  // (Pro úplnost doplň z původního souboru renderSizing funkci – zde ji nechávám zkrácenou)
  function renderSizing(boxId, isActive, accentColor, bands) {
    let html = '';
    bands.forEach((b, idx) => {
      if (isActive && idx === (absSig < 30 ? 0 : absSig < 100 ? 1 : absSig < 200 ? 2 : absSig < 300 ? 3 : 4)) {
        html += `<div style="display:grid;grid-template-columns:80px 120px 1fr;padding:3px 0;white-space:nowrap;background:\( {accentColor};color:#fff;"><b> \){b.label}</b><span>${absSig.toFixed(0)} → \( {recMwh} MWh</span><span style="opacity:0.85;"> \){b.desc}</span></div>`;
      } else {
        html += `<div style="display:grid;grid-template-columns:80px 120px 1fr;padding:3px 0;white-space:nowrap;"><b>\( {b.label}</b><span> \){b.mwh}</span><span style="color:#999;">${b.desc}</span></div>`;
      }
    });
    document.getElementById(boxId).innerHTML = html;
  }

  const isLong = sigEma > 0;
  renderSizing('longSizing', isLong, '#2e7d32', [
    {label: '0-30', mwh: '1 MWh', desc: 'neutrální'},
    {label: '30-100', mwh: '2-3 MWh', desc: 'mírný'},
    {label: '100-200', mwh: '4-7 MWh', desc: 'silný'},
    {label: '200-300', mwh: '7-9 MWh', desc: 'v.silný'},
    {label: '300+', mwh: '10 MWh', desc: 'extrém'}
  ]);
  renderSizing('shortSizing', !isLong && sigEma < 0, '#c62828', [
    {label: '-30 až 0', mwh: '1 MWh', desc: 'neutrální'},
    {label: '-100 až -30', mwh: '2-3 MWh', desc: 'mírný'},
    {label: '-200 až -100', mwh: '4-7 MWh', desc: 'silný'},
    {label: '-300 až -200', mwh: '7-9 MWh', desc: 'v.silný'},
    {label: '-300+', mwh: '10 MWh', desc: 'extrém'}
  ]);

  document.getElementById('emaValue').innerHTML = `<span class="\( {dirColor}"> \){sigEma >= 0 ? '+' : ''}${sigEma.toFixed(1)}</span><span class="u">EUR/MWh</span>`;
  
  const prevEma = ema[sigIdx - 1] || sigEma;
  const dEma = sigEma - prevEma;
  document.getElementById('emaTrend').innerHTML = `Trend: ${dEma >= 0 ? '↗' : '↘'} \( {dEma >= 0 ? '+' : ''} \){dEma.toFixed(1)} EUR vs předch.`;

  // Last price
  let lastPriceRow = rows[rows.length - 1];
  for (let i = rows.length - 1; i >= 0; i--) {
    if (rows[i].kc !== 0) {
      lastPriceRow = rows[i];
      break;
    }
  }
  document.getElementById('lastPrice').innerHTML = `\( {lastPriceRow.odch >= 0 ? '+' : ''} \){lastPriceRow.odch.toFixed(1)}<span class="u">EUR/MWh</span>`;
  document.getElementById('lastPriceInterval').textContent = lastPriceRow.interval;
}

function renderEmaTable(rows, ema) {
  // Tvoje původní funkce – zůstává beze změny (pro úsporu místa ji sem necpám celou)
  // Pokud potřebuješ, řekni a pošlu ji kompletní
  const tbody = document.getElementById('emaTable');
  // ... (vložit sem svůj původní renderEmaTable kód)
}

function renderBacktest(rows, ema) {
  const n = rows.length;
  if (n < LAG + 1) return;

  let netProfit = 0, wins = 0, losses = 0, trades = 0, totalMwh = 0, skipNoVdt = 0;
  let peakEquity = 0, maxDD = 0;
  const hourly = {};
  const tradeList = [];

  const nowMinBT = new Date().getHours() * 60 + new Date().getMinutes();

  for (let i = LAG; i < n; i++) {
    if (BT_PERIOD === 'today' && !rows[i].isToday) continue;

    const sig = ema[i - LAG];           // KLÍČOVÁ OPRAVA - správný lag
    const actual = rows[i].odch;
    const vdt = rows[i].vdt;
    const kc = rows[i].kc;

    const tmBT = rows[i].interval.match(/^(\d{1,2}):(\d{2})/);
    const qhEndMinBT = tmBT ? (parseInt(tmBT[1])*60 + parseInt(tmBT[2]) + 15) : 0;
    const isRecent = BT_PERIOD === 'today' && (nowMinBT - qhEndMinBT) < 30 && (nowMinBT - qhEndMinBT) >= 0;

    if (vdt === null || vdt === undefined) {
      skipNoVdt++;
      tradeList.push({interval: rows[i].interval, sig, skipReason: '⏸ chybí VDT', cumProfit: netProfit});
      continue;
    }
    if (kc === 0 || isRecent) {
      tradeList.push({interval: rows[i].interval, sig, skipReason: '⏸ Odch=0', cumProfit: netProfit});
      continue;
    }
    if (Math.abs(sig) < 1) {
      tradeList.push({interval: rows[i].interval, sig, skipReason: '⏸ |sig|<1', cumProfit: netProfit});
      continue;
    }

    const direction = sig > 0 ? 1 : -1;
    const rawSpread = actual - vdt;
    const mwh = BT_MODE === 'pyr' ? getPositionSize(sig) : 1;
    const net = direction * rawSpread * mwh;

    netProfit += net;
    totalMwh += mwh;
    trades++;
    if (net > 0) wins++; else if (net < 0) losses++;

    if (netProfit > peakEquity) peakEquity = netProfit;
    const dd = netProfit - peakEquity;
    if (dd < maxDD) maxDD = dd;

    const h = parseInt(rows[i].interval.split(':')[0]);
    if (!hourly[h]) hourly[h] = {pnl: 0, n: 0, w: 0};
    hourly[h].pnl += net;
    hourly[h].n++;
    if (net > 0) hourly[h].w++;

    tradeList.push({
      interval: rows[i].interval,
      sig, direction, vdt, actual, net, mwh,
      cumProfit: netProfit
    });
  }

  // === ZBYTEK RENDERU (stats, tabulky) zůstává stejný jako měl ===
  // (Pro úplnost doplň z původního souboru renderBacktest logiku pro hourlyTable, tradesTable atd.)

  // ... (doplň si z původního kódu zbylé části renderBacktest)

  console.log(`[BACKTEST ${BT_PERIOD} \( {BT_MODE}] trades= \){trades} profit=${netProfit.toFixed(0)}`);
}

// Načtení week backtestu zůstává stejné jako v původním kódu (loadWeekBacktest + computeDayBacktest)

loadAll();
setInterval(loadAll, 60000);
</script>
