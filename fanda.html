<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanda data · Ingest viewer</title>
<style>
body, * { font-variant-numeric: lining-nums tabular-nums; font-feature-settings: "zero" 0, "ss01" 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f4f5f9; color: #1a1a2e; padding: 14px; max-width: 1400px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; color: #0d47a1; font-weight: 700; }
h1 small { font-size: 11px; color: #888; font-weight: 400; font-family: 'JetBrains Mono', monospace; }
h2 { font-size: 14px; color: #555; margin: 16px 0 8px; font-weight: 600; }
.row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
.card { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.card-l { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; font-weight: 600; }
.card-v { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1.2; }
.card-s { font-size: 10px; color: #666; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
.green { color: #2e7d32; }
.red { color: #c62828; }
.gray { color: #888; }
.blue { color: #1565c0; }
table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
th { background: #f4f5f9; padding: 6px 8px; text-align: right; font-weight: 600; color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: .02em; }
th:first-child, td:first-child { text-align: left; }
td { padding: 5px 8px; border-top: 1px solid #f0f1f4; text-align: right; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e0e4ef; flex-wrap: wrap; gap: 10px; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.refresh { background: #1565c0; color: white; border: none; padding: 6px 14px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
.refresh:hover { background: #0d47a1; }
select { padding: 6px 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 11px; font-family: inherit; }
.meta { font-size: 10px; color: #888; font-family: 'JetBrains Mono', monospace; }
.empty { text-align: center; color: #999; padding: 40px 20px; font-size: 12px; }
.json-preview { background: #1a1a2e; color: #a5d6a7; padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; overflow-x: auto; max-height: 200px; line-height: 1.5; }
@media (max-width: 600px) {
  body { padding: 8px; }
  h1 { font-size: 18px; }
  .card-v { font-size: 16px; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>📥 Fanda data <small>· /ingest endpoint</small></h1>
    <div class="meta" id="metaInfo">načítám…</div>
  </div>
  <div class="controls">
    <label style="font-size:11px;color:#666;">Source:</label>
    <select id="sourceSelect" onchange="loadData()">
      <option value="">-- vyberte --</option>
    </select>
    <label style="font-size:11px;color:#666;">Type:</label>
    <select id="typeSelect" onchange="loadData()">
      <option value="">všechny</option>
    </select>
    <button class="refresh" onclick="loadList(); loadData();">↺ Refresh</button>
  </div>
</header>

<h2>📊 Přehled zdrojů</h2>
<div class="row" id="summaryRow">
  <div class="card"><div class="card-l">načítám…</div></div>
</div>

<h2>📋 Data (poslední zprávy)</h2>
<div class="card" style="padding:0;" id="dataContainer">
  <div class="empty">Vyberte source nahoře…</div>
</div>

<h2>🔍 RAW JSON (poslední zpráva)</h2>
<div class="card" id="rawContainer">
  <div class="empty">Vyberte source nahoře…</div>
</div>

<script>
const API_URL = window.location.origin;
let _lastList = null;

async function loadList() {
  try {
    const r = await fetch(`${API_URL}/ingest/list?_=${Date.now()}`, { cache: 'no-store' });
    
    if (!r.ok) {
      // Server neumí /ingest endpoint
      document.getElementById('metaInfo').textContent = `⚠ /ingest/list vrací ${r.status} - nasaď nový server.py`;
      document.getElementById('summaryRow').innerHTML = `
        <div class="card" style="grid-column:1/-1;border-left:4px solid #c62828;">
          <div class="card-l red">⚠ Endpoint /ingest neexistuje</div>
          <div class="card-s">
            Status: ${r.status} ${r.statusText}<br>
            <b>Nasaď aktuální server.py</b> - obsahuje POST /ingest endpoint pro příjem dat.
          </div>
        </div>`;
      return;
    }
    
    const d = await r.json();
    _lastList = d;
    
    // Update meta
    document.getElementById('metaInfo').textContent = 
      `${d.total_sources || 0} zdrojů · refresh ${new Date().toLocaleTimeString('cs-CZ')}`;
    
    // Update source dropdown
    const sourceSel = document.getElementById('sourceSelect');
    const currentSrc = sourceSel.value;
    sourceSel.innerHTML = '<option value="">-- vyberte --</option>';
    if (d.sources) {
      for (const src of Object.keys(d.sources).sort()) {
        const info = d.sources[src];
        const opt = document.createElement('option');
        opt.value = src;
        opt.textContent = `${src} (${info.count} zpráv)`;
        sourceSel.appendChild(opt);
      }
      if (currentSrc && d.sources[currentSrc]) sourceSel.value = currentSrc;
      // AUTO-SELECT 'fanda' pokud existuje a nic není vybráno
      else if (!currentSrc && d.sources["fanda"]) {
        sourceSel.value = "fanda";
        setTimeout(() => loadData(), 50);
      }
    }
    
    // Update summary cards
    const summaryRow = document.getElementById('summaryRow');
    if (!d.sources || Object.keys(d.sources).length === 0) {
      summaryRow.innerHTML = `
        <div class="card" style="grid-column:1/-1;border-left:4px solid #f57c00;">
          <div class="card-l">📭 Zatím žádná data</div>
          <div class="card-s" style="margin-top:8px;line-height:1.6;">
            Fanda zatím nic neposlal. Endpoint je připravený.<br><br>
            <b>Pošli Fandovi tento návod:</b><br>
            <div style="background:#fff8e1;padding:8px;border-radius:4px;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:10px;">
              POST <b>${API_URL}/ingest?source=fanda</b><br>
              Content-Type: application/json<br>
              Body: { jakýkoliv JSON }
            </div>
            <div style="margin-top:8px;">
              <b>Test (klikni a otevři terminál):</b><br>
              <code style="background:#f0f1f4;padding:2px 6px;border-radius:3px;font-size:10px;">curl -X POST "${API_URL}/ingest?source=fanda&type=test" -H "Content-Type: application/json" -d '{"hello":123}'</code>
            </div>
          </div>
        </div>`;
    } else {
      let html = '';
      for (const src of Object.keys(d.sources).sort()) {
        const info = d.sources[src];
        const ts = info.latest_ts || '—';
        const tsFmt = ts === '—' ? '—' : ts.replace(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/, '$1-$2-$3 $4:$5:$6');
        html += `<div class="card" style="cursor:pointer;" onclick="document.getElementById('sourceSelect').value='${src}';loadData();">
          <div class="card-l">${src}</div>
          <div class="card-v blue">${info.count}<span style="font-size:11px;color:#888;margin-left:4px;">zpráv</span></div>
          <div class="card-s">Posl: ${tsFmt}</div>
          <div class="card-s gray">Types: ${info.types.join(', ')}</div>
        </div>`;
      }
      summaryRow.innerHTML = html;
    }
    
    // Update type dropdown (na základě selectu)
    updateTypeDropdown();
  } catch(e) {
    console.error('loadList error:', e);
    document.getElementById('metaInfo').textContent = '⚠ Chyba: ' + e.message;
  }
}

function updateTypeDropdown() {
  const typeSel = document.getElementById('typeSelect');
  const src = document.getElementById('sourceSelect').value;
  const currentType = typeSel.value;
  typeSel.innerHTML = '<option value="">všechny</option>';
  if (src && _lastList && _lastList.sources && _lastList.sources[src]) {
    for (const t of _lastList.sources[src].types) {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      typeSel.appendChild(opt);
    }
    if (currentType) typeSel.value = currentType;
  }
}

async function loadData() {
  const src = document.getElementById('sourceSelect').value;
  if (!src) {
    document.getElementById('dataContainer').innerHTML = '<div class="empty">Vyberte source nahoře…</div>';
    document.getElementById('rawContainer').innerHTML = '<div class="empty">Vyberte source nahoře…</div>';
    return;
  }
  
  updateTypeDropdown();
  const type = document.getElementById('typeSelect').value;
  
  try {
    let url = `${API_URL}/ingest/data?source=${encodeURIComponent(src)}&limit=20&_=${Date.now()}`;
    if (type) url += `&type=${encodeURIComponent(type)}`;
    const r = await fetch(url, { cache: 'no-store' });
    const d = await r.json();
    
    if (!d.records || d.records.length === 0) {
      document.getElementById('dataContainer').innerHTML = '<div class="empty">Žádná data pro tento source/type</div>';
      document.getElementById('rawContainer').innerHTML = '<div class="empty">Žádná data</div>';
      return;
    }
    
    // RAW poslední zpráva
    const lastRec = d.records[d.records.length - 1];
    document.getElementById('rawContainer').innerHTML = 
      `<div class="card-l">${lastRec.source} · ${lastRec.type} · ${lastRec.ts}</div>` +
      `<div class="json-preview">${escapeHtml(JSON.stringify(lastRec.data, null, 2))}</div>`;
    
    // Render data table - PŘÍCHÁZÍ jako poslední zpráva
    renderDataTable(lastRec, d.records);
  } catch(e) {
    console.error('loadData error:', e);
    document.getElementById('dataContainer').innerHTML = `<div class="empty">⚠ Chyba: ${e.message}</div>`;
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderDataTable(lastRec, allRecords) {
  const container = document.getElementById('dataContainer');
  const data = lastRec.data;
  
  // Detect format
  let rows = null;
  let formatHint = '';
  
  if (Array.isArray(data)) {
    // Format A: array of objects/values
    if (data.length > 0 && typeof data[0] === 'object' && data[0] !== null) {
      rows = data;
      formatHint = `Array of ${data.length} objects`;
    } else {
      // Array of primitives
      rows = data.map((v, i) => ({ index: i, value: v }));
      formatHint = `Array of ${data.length} hodnot`;
    }
  } else if (data && typeof data === 'object') {
    // Format B: object with "rows" key
    if (Array.isArray(data.rows)) {
      rows = data.rows;
      formatHint = `Object.rows array (${data.rows.length})`;
    } else if (Array.isArray(data.data)) {
      rows = data.data;
      formatHint = `Object.data array (${data.data.length})`;
    } else {
      // Format D: pivot - keys as rows
      const keys = Object.keys(data);
      const allValuesAreObjects = keys.every(k => typeof data[k] === 'object' && data[k] !== null);
      if (allValuesAreObjects && keys.length > 1) {
        rows = keys.map(k => ({ key: k, ...data[k] }));
        formatHint = `Pivot object (${keys.length} klíčů)`;
      } else {
        // Single object - show as key/value pairs
        rows = keys.map(k => ({ key: k, value: JSON.stringify(data[k]) }));
        formatHint = `Single object (${keys.length} polí)`;
      }
    }
  } else {
    container.innerHTML = `<div class="empty">Data: <code>${escapeHtml(String(data))}</code> (nejde do tabulky)</div>`;
    return;
  }
  
  if (!rows || rows.length === 0) {
    container.innerHTML = '<div class="empty">Prázdná tabulka</div>';
    return;
  }
  
  // Collect all columns
  const cols = new Set();
  for (const row of rows) {
    if (typeof row === 'object' && row !== null) {
      Object.keys(row).forEach(k => cols.add(k));
    }
  }
  let colsArr = Array.from(cols);
  // KEY sloupec na začátek
  if (colsArr.includes('key')) {
    colsArr = ['key', ...colsArr.filter(c => c !== 'key')];
  }
  
  // Vlajky pro země - ISO kód → emoji
  const FLAGS = {
    CZ:'🇨🇿', DE:'🇩🇪', AT:'🇦🇹', SK:'🇸🇰', PL:'🇵🇱', HU:'🇭🇺',
    FR:'🇫🇷', IT:'🇮🇹', ES:'🇪🇸', BE:'🇧🇪', NL:'🇳🇱', DK:'🇩🇰',
    GB:'🇬🇧', UK:'🇬🇧', RO:'🇷🇴', BG:'🇧🇬', GR:'🇬🇷', FI:'🇫🇮',
    SE:'🇸🇪', NO:'🇳🇴', IE:'🇮🇪', PT:'🇵🇹', CH:'🇨🇭', LU:'🇱🇺',
    EE:'🇪🇪', LV:'🇱🇻', LT:'🇱🇹', SI:'🇸🇮', HR:'🇭🇷', RS:'🇷🇸',
    BA:'🇧🇦', MK:'🇲🇰', AL:'🇦🇱', ME:'🇲🇪', XK:'🇽🇰', MD:'🇲🇩',
    UA:'🇺🇦', BY:'🇧🇾', TR:'🇹🇷', RU:'🇷🇺', US:'🇺🇸', CA:'🇨🇦',
    EU:'🇪🇺',
  };
  const NAMES_CZ = {
    CZ:'Česko', DE:'Německo', AT:'Rakousko', SK:'Slovensko', PL:'Polsko', HU:'Maďarsko',
    FR:'Francie', IT:'Itálie', ES:'Španělsko', BE:'Belgie', NL:'Nizozemsko', DK:'Dánsko',
    GB:'Británie', UK:'Británie', RO:'Rumunsko', BG:'Bulharsko', GR:'Řecko', FI:'Finsko',
    SE:'Švédsko', NO:'Norsko', IE:'Irsko', PT:'Portugalsko', CH:'Švýcarsko', LU:'Lucembursko',
    EE:'Estonsko', LV:'Lotyšsko', LT:'Litva', SI:'Slovinsko', HR:'Chorvatsko', RS:'Srbsko',
    BA:'Bosna', MK:'Severní Makedonie', AL:'Albánie', ME:'Černá Hora', XK:'Kosovo', MD:'Moldavsko',
    UA:'Ukrajina', BY:'Bělorusko', TR:'Turecko', RU:'Rusko', US:'USA', CA:'Kanada',
    EU:'EU',
  };
  function countryOf(key) {
    if (!key) return null;
    const s = String(key).toLowerCase().trim();
    for (const code of Object.keys(FLAGS)) {
      const c = code.toLowerCase();
      if (s === c || 
          s.includes('_' + c + '_') || 
          s.endsWith('_' + c) || 
          s.startsWith(c + '_') ||
          s.includes('-' + c + '-') ||
          s.endsWith('-' + c) ||
          s.startsWith(c + '-')) {
        return code;
      }
    }
    return null;
  }
  function flagFor(key) {
    const code = countryOf(key);
    return code ? FLAGS[code] : '';
  }
  function nameFor(key) {
    const code = countryOf(key);
    return code ? NAMES_CZ[code] : null;
  }
  
  // Direction
  function directionFor(key) {
    if (!key) return '';
    const s = String(key).toLowerCase();
    if (s.includes('_in') || s.endsWith('in') || s.includes('import')) return 'in';
    if (s.includes('_out') || s.endsWith('out') || s.includes('export')) return 'out';
    return '';
  }
  
  // Display key: "hub_at_in" → "Rakousko in"
  function displayKey(key) {
    const name = nameFor(key);
    const dir = directionFor(key);
    if (name) return name + (dir ? ' ' + dir : '');
    return String(key ?? '');
  }
  
  // Sparkline z numerických hodnot v řádku (kromě key)
  function sparkline(row, w=120, h=22) {
    const vals = [];
    for (const c of colsArr) {
      if (c === 'key') continue;
      const v = row[c];
      if (typeof v === 'number' && isFinite(v)) vals.push(v);
    }
    if (vals.length < 2) return '';
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const range = max - min || 1;
    const pts = vals.map((v, i) => {
      const x = (i / (vals.length - 1)) * (w - 2) + 1;
      const y = h - 2 - ((v - min) / range) * (h - 4);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    return `<svg width="${w}" height="${h}" style="vertical-align:middle;">
      <polyline points="${pts}" fill="none" stroke="#2980b9" stroke-width="1.5"/>
    </svg>`;
  }
  
  // Build HTML
  let html = `<div style="padding:8px 12px;font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:center;">
    <span><b>${lastRec.source}</b> · ${lastRec.type} · ${lastRec.ts}</span>
    <span style="color:#999;">${formatHint}</span>
  </div>`;
  
  html += '<table><thead><tr>';
  for (const c of colsArr) html += `<th>${escapeHtml(c)}</th>`;
  html += '</tr></thead><tbody>';
  
  for (const row of rows) {
    html += '<tr>';
    for (const c of colsArr) {
      const v = row[c];
      let cellHtml = '';
      let cls = '';
      if (c === 'key') {
        const flag = flagFor(v);
        cellHtml = `${flag ? flag + ' ' : ''}<b>${escapeHtml(displayKey(v))}</b>`;
      } else if (v === null || v === undefined) {
        cellHtml = '<span class="gray">—</span>';
      } else if (typeof v === 'number') {
        if (v > 0) cls = 'green';
        else if (v < 0) cls = 'red';
        cellHtml = v.toFixed(Number.isInteger(v) ? 0 : 2);
      } else if (typeof v === 'object') {
        cellHtml = escapeHtml(JSON.stringify(v));
      } else {
        cellHtml = escapeHtml(String(v));
      }
      html += `<td class="${cls}">${cellHtml}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  
  // VELKÉ BAR CHARTY pod tabulkou - kombinované in/out per země
  html += '<div style="padding:14px 12px;border-top:2px solid #eef0f7;">';
  html += '<h3 style="font-size:14px;margin-bottom:10px;">📊 Grafy per země (🟢 in · 🔴 out)</h3>';
  
  // Seskup rows podle ISO země
  const byCountry = {};  // {AT: {in: row, out: row}, ...}
  for (const row of rows) {
    const code = countryOf(row.key);
    const dir = directionFor(row.key);
    if (!code) continue;
    if (!byCountry[code]) byCountry[code] = {};
    byCountry[code][dir || 'unknown'] = row;
  }
  
  // Číselné sloupce (kromě key)
  const numCols = colsArr.filter(c => c !== 'key');
  
  for (const code of Object.keys(byCountry).sort()) {
    const grp = byCountry[code];
    const inRow = grp.in;
    const outRow = grp.out;
    
    // Vyber jen sloupce kde alespoň jedna hodnota existuje a je číslo
    const validCols = numCols.filter(c => {
      const vi = inRow?.[c], vo = outRow?.[c];
      return (typeof vi === 'number' && isFinite(vi)) || (typeof vo === 'number' && isFinite(vo));
    });
    if (validCols.length === 0) continue;
    
    const inVals = validCols.map(c => (typeof inRow?.[c] === 'number' && isFinite(inRow[c])) ? inRow[c] : 0);
    const outVals = validCols.map(c => (typeof outRow?.[c] === 'number' && isFinite(outRow[c])) ? outRow[c] : 0);
    const max = Math.max(...inVals, ...outVals, 1);
    
    // SVG layout
    const H = 240;
    const PAD_TOP = 26;   // místo pro text nad bary
    const PAD_BOT = 32;   // místo pro labels pod
    const chartH = H - PAD_TOP - PAD_BOT;
    const groupCount = validCols.length;
    
    let bars = '';
    for (let i = 0; i < validCols.length; i++) {
      const groupW = 100 / groupCount;
      const barW = groupW * 0.4;  // 2 bary per skupina, mezera mezi
      const groupX = groupW * i;
      
      // IN bar (zelený, vlevo)
      const inH = (inVals[i] / max) * chartH;
      const inY = PAD_TOP + chartH - inH;
      bars += `<rect x="${groupX + groupW * 0.05}%" y="${inY}" width="${barW}%" height="${inH}" fill="#27ae60" rx="2"/>`;
      if (inVals[i] > 0) {
        bars += `<text x="${groupX + groupW * 0.05 + barW/2}%" y="${inY - 3}" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">${inVals[i].toFixed(0)}</text>`;
      }
      
      // OUT bar (červený, vpravo)
      const outH = (outVals[i] / max) * chartH;
      const outY = PAD_TOP + chartH - outH;
      bars += `<rect x="${groupX + groupW * 0.55}%" y="${outY}" width="${barW}%" height="${outH}" fill="#e74c3c" rx="2"/>`;
      if (outVals[i] > 0) {
        bars += `<text x="${groupX + groupW * 0.55 + barW/2}%" y="${outY - 3}" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="600">${outVals[i].toFixed(0)}</text>`;
      }
      
      // Label pod
      bars += `<text x="${groupX + groupW/2}%" y="${PAD_TOP + chartH + 14}" text-anchor="middle" font-size="9" fill="#666">${escapeHtml(validCols[i])}</text>`;
    }
    
    // Baseline
    bars += `<line x1="0" y1="${PAD_TOP + chartH}" x2="100%" y2="${PAD_TOP + chartH}" stroke="#bdc3c7" stroke-width="1"/>`;
    
    html += `<div style="margin-bottom:18px;background:#fafbfd;border:1px solid #eef0f7;border-radius:6px;padding:10px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px;">
        <span>${FLAGS[code] || ''} ${NAMES_CZ[code] || code}</span>
        <span style="font-size:11px;font-weight:400;color:#666;">
          <span style="color:#27ae60;">▮ in</span> · <span style="color:#e74c3c;">▮ out</span> · max ${max.toFixed(0)} MW
        </span>
      </div>
      <svg width="100%" height="${H}" style="display:block;" preserveAspectRatio="none">
        ${bars}
      </svg>
    </div>`;
  }
  
  // Země bez ISO (orphans) - dej do extra sekce
  const orphanRows = rows.filter(r => !countryOf(r.key));
  if (orphanRows.length) {
    html += '<details style="margin-top:10px;"><summary style="cursor:pointer;font-size:12px;color:#666;">Ostatní řádky (' + orphanRows.length + ')</summary>';
    for (const row of orphanRows) {
      const series = numCols.map(c => ({label: c, value: row[c]})).filter(s => typeof s.value === 'number' && isFinite(s.value));
      if (!series.length) continue;
      const max = Math.max(...series.map(s => Math.abs(s.value)), 1);
      let bars = '';
      const H = 200, PAD_TOP=22, PAD_BOT=28, chartH=H-PAD_TOP-PAD_BOT;
      for (let i=0; i<series.length; i++) {
        const groupW = 100/series.length;
        const barW = groupW*0.7;
        const groupX = groupW*i;
        const v = series[i].value;
        const bH = (Math.abs(v)/max)*chartH;
        const bY = PAD_TOP + chartH - bH;
        const color = v >= 0 ? '#27ae60' : '#e74c3c';
        bars += `<rect x="${groupX+groupW*0.15}%" y="${bY}" width="${barW}%" height="${bH}" fill="${color}" rx="2"/>`;
        bars += `<text x="${groupX+groupW/2}%" y="${bY-3}" text-anchor="middle" font-size="9" fill="${color}">${v.toFixed(0)}</text>`;
        bars += `<text x="${groupX+groupW/2}%" y="${PAD_TOP+chartH+14}" text-anchor="middle" font-size="9" fill="#666">${escapeHtml(series[i].label)}</text>`;
      }
      html += `<div style="margin:10px 0;background:#fafbfd;border:1px solid #eef0f7;border-radius:6px;padding:10px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${escapeHtml(displayKey(row.key))}</div>
        <svg width="100%" height="${H}" style="display:block;">${bars}</svg>
      </div>`;
    }
    html += '</details>';
  }
  html += '</div>';
  
  // History dropdown (other timestamps for this source/type)
  if (allRecords.length > 1) {
    html += '<div style="padding:8px 12px;font-size:10px;color:#888;border-top:1px solid #eef0f7;">';
    html += `${allRecords.length} zpráv celkem · zobrazena POSLEDNÍ.`;
    html += '</div>';
  }
  
  container.innerHTML = html;
}

// Init
loadList();
setInterval(loadList, 30000);  // refresh seznam každých 30s
setInterval(loadData, 30000);   // refresh data každých 30s
</script>
