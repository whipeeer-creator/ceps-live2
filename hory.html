<!--
================================================================
  ČEPS LIVE — MOBILE FIX (drop-in)
================================================================
  Otevři svůj `index.html` (nebo jak se ten soubor jmenuje)
  a vlož TENTO CELÝ OBSAH těsně před závěrečnou značku </body>.

  Žádné jiné úpravy nejsou potřeba. Mobile verze:
  - tabulky se budou horizontálně scrollovat svipem
  - labely vlevo (€/MWh, :00, :15, zítra, ...) zůstanou
    viditelné i při scrollu (sticky position)
  - header se zkompaktní
  - grafy budou nižší
  - KPI karty 2 v řadě místo 4
================================================================
-->

<style id="mobile-fix-styles">
/* Tabulky cen - hor. scroll vzdy povolen (i na desktopu kdyz se nevejdou) */
#spotTablesWrap {
  -webkit-overflow-scrolling: touch;
  overflow-x: auto;
}
#spotTablesWrap table {
  table-layout: auto !important;
  width: auto !important;
  min-width: 100%;
}

@media (max-width: 760px) {
  /* === HEADER === */
  header { padding: 4px 6px; gap: 4px; min-height: auto; }
  .logo { font-size: 11px; }
  .logo span { display: none; }
  .hdr-info { font-size: 9px; }
  .badge { font-size: 10px; padding: 2px 7px; }
  #toZeroChip { font-size: 10px; padding: 2px 6px; }
  .legend-dots { font-size: 9px; gap: 3px; }
  .legend-dots .ldot-l { margin-right: 3px; }
  .hbtn { padding: 3px 7px; font-size: 10px; }
  .rsel { font-size: 10px; padding: 3px 5px; }
  .cd { font-size: 10px; min-width: 24px; }

  /* === HLAVNI LAYOUT === */
  main { padding: 8px 6px; gap: 8px; }
  .chart-panel { border-radius: 6px; }
  .panel-hdr { padding: 6px 8px; }
  .panel-title { font-size: 11px; }
  .panel-sub { font-size: 9px; }

  /* === TABULKY CEN === */
  #spotTablesWrap { padding: 6px 4px !important; }
  #spotTablesWrap > table { min-width: 880px; }
  #spotTablesWrap > table th,
  #spotTablesWrap > table td {
    font-size: 10px !important;
    padding: 3px 4px !important;
    min-width: 32px;
  }
  #spotTablesWrap > table th div { font-size: 7px !important; }
  /* PRVNI SLOUPEC = STICKY (CSS pristup) */
  #spotTablesWrap > table th:first-child,
  #spotTablesWrap > table td:first-child {
    position: sticky !important;
    left: 0 !important;
    z-index: 5 !important;
    min-width: 55px !important;
    box-shadow: 2px 0 4px -2px rgba(0,0,0,0.18);
  }

  /* === HISTORICKA TABULKA === */
  #tbl-hist-odch-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  #tbl-hist-odch-wrap > table {
    table-layout: auto !important;
    width: auto !important;
    min-width: 1000px;
  }
  #tbl-hist-odch-wrap > table th,
  #tbl-hist-odch-wrap > table td {
    font-size: 9px !important;
    padding: 2px 3px !important;
    min-width: 28px;
  }
  #tbl-hist-odch-wrap > table th:first-child,
  #tbl-hist-odch-wrap > table td:first-child {
    position: sticky !important;
    left: 0 !important;
    z-index: 5 !important;
    min-width: 55px !important;
    box-shadow: 2px 0 4px -2px rgba(0,0,0,0.18);
  }

  /* === SWIPE NAPOVEDA === */
  #spotTablesWrap::before,
  #tbl-hist-odch-wrap::before {
    content: "← swipe pro všech 24 hodin →";
    display: block;
    text-align: center;
    font-size: 9px;
    color: #888;
    padding: 4px 0;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  /* === KPI === */
  .kpi-row { grid-template-columns: 1fr 1fr !important; gap: 6px; }
  .kpi-row.kpi-row-wide { grid-template-columns: 1fr !important; }
  .kpi { padding: 8px 10px; }
  .kpi-l { font-size: 9px; }
  .kpi-v { font-size: 16px; }
  .kpi-s { font-size: 9px; }

  /* === GRAFY === */
  #topCanvas { height: 220px !important; }
  #botCanvas { height: 360px !important; }
  #reCanvas  { height: 420px !important; }
  #resCanvas { height: 380px !important; }
  #rlCanvas  { height: 260px !important; }
  #histProbCanvas { height: 220px !important; }
  #magmaCanvas { height: 320px !important; }

  /* === LEGENDY === */
  .panel-legend { padding: 4px 8px; gap: 8px; font-size: 9px; }
  .pleg { font-size: 9px; }
  .pleg-sq { width: 14px; height: 8px; }

  /* === TOGGLES PRO RE === */
  #reToggles { padding: 6px 8px; gap: 6px; font-size: 10px; }
  #reToggles label { gap: 3px; }

  /* === REGELLEISTUNG === */
  .rl-controls { padding: 6px 8px; gap: 6px; }
  .rl-controls input[type="date"] { font-size: 10px; padding: 3px 6px; }
  .dir-toggle button { padding: 3px 8px; font-size: 10px; }
  .rl-status { font-size: 9px; }
}

@media (max-width: 420px) {
  .legend-dots { display: none; }
  .logo em { font-size: 10px; }
  .hdr-info b { display: none; }
}
</style>

<script id="mobile-fix-js">
/*
 * Sticky labely v dynamickych tabulkach.
 * Tabulky generuje puvodni JS s inline backgroundy, ktere prebijeji
 * CSS selektory na :first-child. Pridame tedy position:sticky inline,
 * a to opakovane po kazdem rerenderingu.
 */
(function() {
  const TABLE_IDS = [
    'tbl-cena', 'tbl-spot-cz', 'tbl-spot-de',
    'tbl-spot-cz-qh', 'tbl-hist-odch'
  ];

  function applyStickyToFirstCol(tableId) {
    const tbl = document.getElementById(tableId);
    if (!tbl) return;
    // Vsechny prvni TD/TH v kazdem radku
    tbl.querySelectorAll('tr').forEach(tr => {
      const firstCell = tr.children[0];
      if (!firstCell) return;
      // Nastav inline styly s vyssi specifitou nez puvodni inline
      firstCell.style.setProperty('position', 'sticky', 'important');
      firstCell.style.setProperty('left', '0', 'important');
      firstCell.style.setProperty('z-index', '5', 'important');
    });
  }

  function applyAll() {
    TABLE_IDS.forEach(applyStickyToFirstCol);
  }

  // Pozoruj zmeny obsahu tabulek - puvodni kod casto prepise innerHTML
  function observeAll() {
    TABLE_IDS.forEach(id => {
      const tbl = document.getElementById(id);
      if (!tbl) return;
      const obs = new MutationObserver(() => applyStickyToFirstCol(id));
      obs.observe(tbl, { childList: true, subtree: true });
    });
  }

  // Spusti po nacteni DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      applyAll();
      observeAll();
    });
  } else {
    applyAll();
    observeAll();
  }

  // Bezpecnostni opakovani - kazdou vterinu prvnich 30s
  // pro pripad ze tabulky se nactou s pomalym fetchem
  let ticks = 0;
  const interval = setInterval(() => {
    applyAll();
    if (++ticks > 30) clearInterval(interval);
  }, 1000);
})();
</script>
