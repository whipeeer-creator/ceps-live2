<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hruška · VDT × Residual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f6; font-family: 'Inter', sans-serif; font-size: 12px; color: #1a1a2e; }

#setupModal { position: fixed; inset: 0; background: rgba(30,40,80,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: #fff; border-radius: 10px; padding: 26px 28px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-title span { color: #1565c0; }
.modal-sub { font-size: 11px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.modal-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; display: block; }
.modal-inp { width: 100%; background: #f4f5f9; border: 1px solid #dde; color: #1a1a2e; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 11px; border-radius: 6px; outline: none; margin-bottom: 10px; }
.modal-inp:focus { border-color: #1565c0; }
.modal-btns { display: flex; gap: 8px; }
.btn-p { background: #1565c0; color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 6px; cursor: pointer; flex: 1; }
.btn-p:hover { background: #1251a0; }

header { background: #fff; border-bottom: 1px solid #e0e4ef; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; min-height: 42px; gap: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.logo { font-size: 14px; font-weight: 700; letter-spacing: .04em; }
.logo em { color: #1565c0; font-style: normal; }
.hbtn { background: #f4f5f9; border: 1px solid #dde; color: #666; font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
.hbtn:hover { border-color: #1565c0; color: #1565c0; }

.chart-panel { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; }
.panel-hdr { padding: 9px 14px; border-bottom: 1px solid #eef0f8; }
.panel-title { font-size: 13px; font-weight: 600; }
.panel-sub { font-size: 10px; color: #666; }
.panel-legend { background: #f4f5f9; border-top: 1px solid #eef0f8; padding: 7px 12px; display: flex; gap: 14px; flex-wrap: wrap; }
.pleg { font-size: 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.pleg-sq { width: 18px; height: 10px; border-radius: 1px; flex-shrink: 0; }

canvas { max-width: 100%; display: block; background: #fff; }
</style>
</head>
<body>

<div id="setupModal">
  <div class="modal-box">
    <div class="modal-title">Hruška <span>· VDT korelace</span></div>
    <div class="modal-sub">Zadej URL svého ČEPS proxy serveru.</div>
    <label class="modal-lbl">SERVER URL</label>
    <input id="apiInput" class="modal-inp" type="url" value="https://ceps-live2.onrender.com" placeholder="https://...">
    <div class="modal-btns">
      <button class="btn-p" onclick="saveApi()">Pokračovat</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">HRUŠKA <em>· residual delta</em></div>
  <div class="hdr-info">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">—</span>
  </div>
  <div>
    <button class="hbtn" onclick="loadVdtWind()">↻ Refresh</button>
    <button class="hbtn" onclick="changeApi()">⚙</button>
  </div>
</header>

<main>
  <div class="kpi-row">
    <div class="kpi" id="crd-VDT">
      <div class="kpi-l">VDT poslední</div>
      <div class="kpi-v" id="dv-VDT">—<span class="kpi-u">EUR/MWh</span></div>
      <div class="kpi-s" id="ds-VDT">—</div>
    </div>
  </div>

  <div class="chart-panel">
    <div class="panel-hdr">
      <div>
        <div class="panel-title">VDT cena × Residual Load × Forecast Delta</div>
        <div class="panel-sub">Y-osa = percentil (0–100 %). Stejný směr = korelace. Tažení = posun, kolečko = zoom.</div>
      </div>
    </div>
    <div id="vwTip" style="background:#1a1a2e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 14px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #2c3e50;min-height:36px;"></div>
    <div style="position:relative; overflow:hidden;" id="vwWrap">
      <canvas id="vwCanvas" height="500" style="width:100%;height:500px;"></canvas>
      <div id="vwLine" style="position:absolute;display:none;pointer-events:none;width:1px;background:rgba(26,26,46,0.4);top:0;bottom:0;z-index:9;"></div>
    </div>
    <div class="panel-legend" id="vwLegend">
      <label class="pleg vw-tg"><input type="checkbox" id="vw-tg-vdt" checked> <span class="pleg-sq" style="background:#e74c3c;"></span> VDT <span id="lv-vdt" style="color:#e74c3c;">—</span></label>
      <label class="pleg vw-tg"><input type="checkbox" id="vw-tg-smard" checked> <span class="pleg-sq" style="background:#1a1a2e;"></span> SMARD <span id="lv-smard" style="color:#1a1a2e;">—</span></label>
      <label class="pleg vw-tg"><input type="checkbox" id="vw-tg-rlfc" checked> <span class="pleg-sq" style="background:#7f8c8d;"></span> Forecast <span id="lv-rlfc" style="color:#7f8c8d;">—</span></label>
      <label class="pleg vw-tg"><input type="checkbox" id="vw-tg-rldelta" checked> <span class="pleg-sq" style="background:#27ae60;"></span> Delta <span id="lv-rldelta" style="color:#27ae60;">—</span></label>
    </div>
  </div>
</main>

<script>
let API_URL = localStorage.getItem('ceps_api_url') || '';

function setStatus(text, type = '') {
  document.getElementById('statusDot').className = 'dot' + (type ? ' ' + type : '');
  document.getElementById('statusText').textContent = text;
}

function changeApi() {
  document.getElementById('apiInput').value = API_URL;
  document.getElementById('setupModal').style.display = 'flex';
}

function saveApi() {
  const url = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
  if (url) {
    API_URL = url;
    localStorage.setItem('ceps_api_url', url);
  }
  document.getElementById('setupModal').style.display = 'none';
  loadVdtWind();
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  canvas.width = W * dpr;
  canvas.height = 500 * dpr;
  canvas.style.width = W + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W, H: 500 };
}

// ==================== HLAVNÍ KRESLÍCÍ FUNKCE ====================
function drawVdtWind() {
  const canvas = document.getElementById('vwCanvas');
  if (!canvas) return;

  const data = window._vwData || {};
  const vdtAll = data.vdtAll;
  const residual = data.residual;
  const smard = data.smard;

  const showVdt     = document.getElementById('vw-tg-vdt')?.checked ?? true;
  const showSmard   = document.getElementById('vw-tg-smard')?.checked ?? true;
  const showRlFc    = document.getElementById('vw-tg-rlfc')?.checked ?? true;
  const showRlDelta = document.getElementById('vw-tg-rldelta')?.checked ?? true;

  const { ctx, W, H } = setupCanvas(canvas);
  ctx.clearRect(0, 0, W, H);

  const ml = 50, mr = 60, mt = 20, mb = 35;
  const pw = W - ml - mr;
  const ph = H - mt - mb;

  // Parse points
  const vdtPts = [], rlFcPts = [], smardPts = [], rlActPts = [];
  if (Array.isArray(vdtAll)) {
    for (const arr of vdtAll) {
      if (!arr?.data) continue;
      for (const r of arr.data) {
        if (r.timestamp && r.last != null) {
          vdtPts.push({ ts: new Date(r.timestamp).getTime(), v: parseFloat(r.last) });
        }
      }
    }
  }
  if (residual?.data) {
    for (const r of residual.data) {
      const ts = new Date(r.berlin_time || r.ts).getTime();
      if (isNaN(ts)) continue;
      if (r.residual_load_actual_mw != null) rlActPts.push({ ts, v: r.residual_load_actual_mw });
      if (r.residual_load_mw != null) rlFcPts.push({ ts, v: r.residual_load_mw });
    }
  }
  if (smard?.data) {
    for (const r of smard.data) {
      const ts = new Date(r.berlin_time || r.ts).getTime();
      if (isNaN(ts)) continue;
      if (r.residual_mw != null) smardPts.push({ ts, v: r.residual_mw });
    }
  }

  // Fixed ranges (klíčová oprava)
  if (!window._fixedRanges) {
    const rlFcRange = minMaxAll(rlFcPts);
    const smardRange = minMaxAll(smardPts);
    const rlDeltaPts = computeDelta(rlActPts, rlFcPts);
    const deltaRange = rlDeltaPts.length ? minMaxAll(rlDeltaPts) : null;
    let deltaFixed = null;
    if (deltaRange) {
      const abs = Math.max(Math.abs(deltaRange.min), Math.abs(deltaRange.max), 1);
      deltaFixed = { min: -abs, max: abs };
    }
    window._fixedRanges = { rlFcRange, smardRange, rlDeltaPts, deltaFixed };
  }

  const fixed = window._fixedRanges;

  function minMaxAll(pts) {
    if (!pts.length) return { min: 0, max: 100 };
    let mn = Infinity, mx = -Infinity;
    for (const p of pts) { mn = Math.min(mn, p.v); mx = Math.max(mx, p.v); }
    return { min: mn, max: mx };
  }

  function computeDelta(act, fc) {
    const delta = [];
    const fcMap = new Map(fc.map(p => [p.ts, p.v]));
    for (const a of act) {
      let fcv = fcMap.get(a.ts);
      if (fcv == null) {
        let best = null, bestD = Infinity;
        for (const f of fc) {
          const d = Math.abs(f.ts - a.ts);
          if (d < bestD) { bestD = d; best = f.v; }
        }
        fcv = best;
      }
      if (fcv != null) delta.push({ ts: a.ts, v: a.v - fcv });
    }
    return delta;
  }

  function minMaxView(pts, xMin, xMax) {
    let mn = Infinity, mx = -Infinity;
    for (const p of pts) {
      if (p.ts >= xMin && p.ts <= xMax) {
        mn = Math.min(mn, p.v);
        mx = Math.max(mx, p.v);
      }
    }
    if (mn === Infinity) return null;
    const r = mx - mn || 1;
    return { min: mn - r*0.08, max: mx + r*0.08 };
  }

  // Viewport
  const view = window._vwView || { offsetMs: 0, spanH: 24 };
  window._vwView = view;

  let dataMin = Infinity, dataMax = -Infinity;
  [...vdtPts, ...rlFcPts, ...smardPts].forEach(p => {
    dataMin = Math.min(dataMin, p.ts);
    dataMax = Math.max(dataMax, p.ts);
  });

  const anchorMax = vdtPts.length ? vdtPts[vdtPts.length-1].ts : dataMax;
  const spanMs = view.spanH * 3600000;
  let xMax = anchorMax + view.offsetMs;
  let xMin = xMax - spanMs;

  if (xMin < dataMin - 3600000) { xMin = dataMin - 3600000; xMax = xMin + spanMs; }
  if (xMax > dataMax + 3600000) { xMax = dataMax + 3600000; xMin = xMax - spanMs; }

  const vdtRange = minMaxView(vdtPts, xMin, xMax) || minMaxAll(vdtPts);
  const rlFcRange = fixed.rlFcRange;
  const smardRange = fixed.smardRange;
  const deltaRange = fixed.deltaFixed;

  const x2 = ts => ml + ((ts - xMin) / (xMax - xMin)) * pw;
  const yNorm = (v, range) => {
    if (!range || range.max === range.min) return mt + ph/2;
    return mt + (1 - (v - range.min) / (range.max - range.min)) * ph;
  };

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  ctx.font = '10px monospace';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const y = mt + (ph * i / 5);
    ctx.beginPath(); ctx.moveTo(ml, y); ctx.lineTo(W - mr, y); ctx.stroke();
    ctx.fillText((100 - i*20) + '%', ml - 4, y + 3);
  }

  // X labels, Now line, drawLineNorm... (stejné jako dříve)
  // (pro zkrácení jsem je nechal stejné – fungují)

  function drawLineNorm(pts, range, color, width = 2, dash = null) {
    if (!pts.length) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath();
    let started = false;
    for (const p of pts) {
      if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
      const x = x2(p.ts);
      const y = yNorm(p.v, range);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  if (showRlFc)  drawLineNorm(rlFcPts, rlFcRange, '#7f8c8d', 1.5, [5,3]);
  if (showSmard) drawLineNorm(smardPts, smardRange, '#1a1a2e', 2);
  if (showVdt)   drawLineNorm(vdtPts, vdtRange, '#e74c3c', 2.5);

  // Delta
  if (showRlDelta && fixed.rlDeltaPts.length && deltaRange) {
    const zeroY = yNorm(0, deltaRange);
    ctx.strokeStyle = 'rgba(39,174,96,0.3)';
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(ml, zeroY); ctx.lineTo(W-mr, zeroY); ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    let s = false;
    for (const p of fixed.rlDeltaPts) {
      if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
      const x = x2(p.ts);
      const y = yNorm(p.v, deltaRange);
      if (!s) { ctx.moveTo(x,y); s=true; } else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Hover data
  window._vwHover = { xMin, xMax, ml, mr, pw, ph, W, H, vdtPts, rlFcPts, smardPts, rlDeltaPts: fixed.rlDeltaPts,
    vdtRange, rlFcRange, smardRange, deltaRange, showVdt, showSmard, showRlFc, showRlDelta, yNorm };
}

// Zbytek (interakce, load, toggles...) zůstává stejný jako v tvém posledním kódu
// (přidej ho sem pokud chceš, ale hlavní problém je vyřešený výše)

async function loadVdtWind() { /* tvůj původní kód načítání */ 
  // ... (zachovej svůj loadVdtWind, jen na konci zavolej drawAllCharts())
}

function drawAllCharts() {
  drawVdtWind();
}

// Init atd.
window._vwView = { offsetMs: 0, spanH: 24 };

window.addEventListener('load', () => {
  if (API_URL) loadVdtWind();
  else document.getElementById('setupModal').style.display = 'flex';
});
</script>

</body>
</html>
