<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hruška · VDT × Residual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f6; font-family: 'Inter', sans-serif; font-size: 12px; color: #1a1a2e; }

#setupModal { position: fixed; inset: 0; background: rgba(30,40,80,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: #fff; border-radius: 10px; padding: 26px 28px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-title span { color: #1565c0; }
.modal-sub { font-size: 11px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.modal-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; display: block; }
.modal-inp { width: 100%; background: #f4f5f9; border: 1px solid #dde; color: #1a1a2e; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 11px; border-radius: 6px; outline: none; margin-bottom: 10px; }
.modal-inp:focus { border-color: #1565c0; }
.modal-btns { display: flex; gap: 8px; }
.btn-p { background: #1565c0; color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 6px; cursor: pointer; flex: 1; }

header { background: #fff; border-bottom: 1px solid #e0e4ef; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; min-height: 42px; gap: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.logo { font-size: 14px; font-weight: 700; letter-spacing: .04em; }
.logo em { color: #1565c0; font-style: normal; }
.hbtn { background: #f4f5f9; border: 1px solid #dde; color: #666; font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer; }

.chart-panel { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; }
.panel-legend { background: #f4f5f9; border-top: 1px solid #eef0f8; padding: 8px 12px; display: flex; gap: 16px; flex-wrap: wrap; }
.pleg { font-size: 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.pleg-sq { width: 18px; height: 10px; border-radius: 2px; flex-shrink: 0; }

canvas { display: block; background: #fff; }
</style>
</head>
<body>

<div id="setupModal">
  <div class="modal-box">
    <div class="modal-title">Hruška <span>· VDT korelace</span></div>
    <div class="modal-sub">Zadej URL svého ČEPS proxy serveru.</div>
    <label class="modal-lbl">SERVER URL</label>
    <input id="apiInput" class="modal-inp" type="url" value="https://ceps-live2.onrender.com" placeholder="https://...">
    <div class="modal-btns">
      <button class="btn-p" onclick="saveApi()">Pokračovat</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">HRUŠKA <em>· residual delta</em></div>
  <div>
    <button class="hbtn" onclick="loadVdtWind()">↻ Refresh</button>
    <button class="hbtn" onclick="changeApi()">⚙</button>
  </div>
</header>

<main>
  <div class="kpi-row">
    <div class="kpi" id="crd-VDT">
      <div class="kpi-l">VDT poslední</div>
      <div class="kpi-v" id="dv-VDT">—<span class="kpi-u">EUR/MWh</span></div>
      <div class="kpi-s" id="ds-VDT">—</div>
    </div>
  </div>

  <div class="chart-panel">
    <div class="panel-hdr" style="padding:10px 14px">
      <div>
        <div class="panel-title">VDT × Residual Load × Delta</div>
        <div class="panel-sub">Tažení myší = posun | Kolečko = zoom</div>
      </div>
    </div>
    <div id="vwTip" style="background:#1a1a2e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 14px;min-height:38px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #334455;"></div>
    <div style="position:relative" id="vwWrap">
      <canvas id="vwCanvas" height="500"></canvas>
      <div id="vwLine" style="position:absolute;display:none;width:1px;height:100%;background:rgba(255,255,255,0.4);pointer-events:none;z-index:10;"></div>
    </div>
    <div class="panel-legend">
      <label class="pleg"><input type="checkbox" id="vw-tg-vdt" checked> <span class="pleg-sq" style="background:#e74c3c"></span> VDT <span id="lv-vdt" style="color:#e74c3c;font-weight:600"></span></label>
      <label class="pleg"><input type="checkbox" id="vw-tg-smard" checked> <span class="pleg-sq" style="background:#1a1a2e"></span> SMARD <span id="lv-smard" style="color:#1a1a2e;font-weight:600"></span></label>
      <label class="pleg"><input type="checkbox" id="vw-tg-rlfc" checked> <span class="pleg-sq" style="background:#7f8c8d"></span> Forecast <span id="lv-rlfc" style="color:#7f8c8d;font-weight:600"></span></label>
      <label class="pleg"><input type="checkbox" id="vw-tg-rldelta" checked> <span class="pleg-sq" style="background:#27ae60"></span> Delta <span id="lv-rldelta" style="color:#27ae60;font-weight:600"></span></label>
    </div>
  </div>
</main>

<script>
let API_URL = localStorage.getItem('ceps_api_url') || '';

window._vwView = { offsetMs: 0, spanH: 24 };
window._vwData = {};
window._fixedRanges = null;

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function changeApi() {
  document.getElementById('apiInput').value = API_URL || 'https://ceps-live2.onrender.com';
  document.getElementById('setupModal').style.display = 'flex';
}

function saveApi() {
  API_URL = document.getElementById('apiInput').value.trim();
  localStorage.setItem('ceps_api_url', API_URL);
  document.getElementById('setupModal').style.display = 'none';
  loadVdtWind();
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  canvas.width = W * dpr;
  canvas.height = 500 * dpr;
  canvas.style.width = W + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return {ctx, W, H: 500};
}

// ==================== DRAW ====================
function drawVdtWind() {
  const canvas = document.getElementById('vwCanvas');
  if (!canvas) return;

  const {vdtAll, residual, smard} = window._vwData;
  const showVdt = document.getElementById('vw-tg-vdt').checked;
  const showSmard = document.getElementById('vw-tg-smard').checked;
  const showRlFc = document.getElementById('vw-tg-rlfc').checked;
  const showRlDelta = document.getElementById('vw-tg-rldelta').checked;

  const {ctx, W, H} = setupCanvas(canvas);
  ctx.clearRect(0, 0, W, H);

  const ml=52, mr=65, mt=25, mb=45;
  const pw = W - ml - mr;
  const ph = H - mt - mb;

  // Parse data
  const vdtPts = [], rlFcPts = [], smardPts = [], rlActPts = [];
  // ... (parse stejný jako dříve)

  if (Array.isArray(vdtAll)) {
    for (const arr of vdtAll) {
      if (!arr?.data) continue;
      for (const r of arr.data) {
        if (r.timestamp && r.last != null) {
          vdtPts.push({ts: new Date(r.timestamp).getTime(), v: parseFloat(r.last)});
        }
      }
    }
  }
  if (residual?.data) {
    for (const r of residual.data) {
      const ts = new Date(r.berlin_time || r.ts).getTime();
      if (isNaN(ts)) continue;
      if (r.residual_load_actual_mw != null) rlActPts.push({ts, v: r.residual_load_actual_mw});
      if (r.residual_load_mw != null) rlFcPts.push({ts, v: r.residual_load_mw});
    }
  }
  if (smard?.data) {
    for (const r of smard.data) {
      const ts = new Date(r.berlin_time || r.ts).getTime();
      if (isNaN(ts)) continue;
      if (r.residual_mw != null) smardPts.push({ts, v: r.residual_mw});
    }
  }

  // Fixed ranges
  if (!window._fixedRanges) {
    window._fixedRanges = {
      rlFc: minMaxAll(rlFcPts),
      smard: minMaxAll(smardPts),
      deltaPts: computeDelta(rlActPts, rlFcPts)
    };
    const d = minMaxAll(window._fixedRanges.deltaPts);
    const abs = Math.max(Math.abs(d.min), Math.abs(d.max), 10);
    window._fixedRanges.delta = {min: -abs, max: abs};
  }
  const f = window._fixedRanges;

  function minMaxAll(pts) {
    if (!pts.length) return {min:0, max:100};
    let mn=Infinity, mx=-Infinity;
    for (let p of pts) {
      mn = Math.min(mn, p.v);
      mx = Math.max(mx, p.v);
    }
    return {min:mn, max:mx};
  }

  function computeDelta(act, fc) {
    const out = [];
    const map = new Map(fc.map(p=>[p.ts, p.v]));
    for (let a of act) {
      let val = map.get(a.ts);
      if (val == null) {
        let best = null, bestD = Infinity;
        for (let p of fc) {
          let d = Math.abs(p.ts - a.ts);
          if (d < bestD) { bestD = d; best = p.v; }
        }
        val = best;
      }
      if (val != null) out.push({ts: a.ts, v: a.v - val});
    }
    return out;
  }

  // Viewport + draw logic (zjednodušené, ale funkční)
  const view = window._vwView;
  let xMin = Date.now() - view.spanH*3600000 + view.offsetMs;
  let xMax = Date.now() + view.offsetMs;

  const vdtRange = minMaxAll(vdtPts); // dynamické pro VDT
  const x2 = ts => ml + ((ts - xMin) / (xMax - xMin)) * pw;
  const yNorm = (v, range) => mt + (1 - (v - range.min)/(range.max - range.min)) * ph;

  // Draw lines
  function drawLine(pts, range, color, w=2, dash=null) {
    if (!pts.length) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath();
    let s = false;
    for (let p of pts) {
      if (p.ts < xMin || p.ts > xMax) continue;
      const x = x2(p.ts);
      const y = yNorm(p.v, range);
      if (!s) { ctx.moveTo(x,y); s = true; }
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  if (showVdt) drawLine(vdtPts, vdtRange, '#e74c3c', 2.8);
  if (showRlFc) drawLine(rlFcPts, f.rlFc, '#7f8c8d', 1.6, [5,3]);
  if (showSmard) drawLine(smardPts, f.smard, '#1a1a2e', 2.2);
  if (showRlDelta && f.deltaPts.length) drawLine(f.deltaPts, f.delta, '#27ae60', 1.9);

  window._vwHover = {xMin, xMax, ml, mr:65, pw, ph, W, H, vdtPts, rlFcPts, smardPts, deltaPts: f.deltaPts, yNorm, x2};
}

async function loadVdtWind() {
  window._fixedRanges = null;
  // ... fetch data (zachovej svůj původní fetch kód)
  drawVdtWind();
}

// Init
window.addEventListener('load', () => {
  if (API_URL) loadVdtWind();
  else document.getElementById('setupModal').style.display = 'flex';
});

document.querySelectorAll('input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', drawVdtWind);
});
</script>
</body>
</html>
