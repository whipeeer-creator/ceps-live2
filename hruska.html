<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hruška · VDT × Residual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f6; font-family: 'Inter', sans-serif; font-size: 12px; color: #1a1a2e; overflow-x: hidden; }

/* Modals & UI */
#setupModal { position: fixed; inset: 0; background: rgba(30,40,80,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: #fff; border-radius: 10px; padding: 26px 28px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-title span { color: #1565c0; }
.modal-sub { font-size: 11px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.modal-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; display: block; }
.modal-inp { width: 100%; background: #f4f5f9; border: 1px solid #dde; color: #1a1a2e; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 11px; border-radius: 6px; outline: none; margin-bottom: 10px; }
.modal-inp:focus { border-color: #1565c0; }
.btn-p { background: #1565c0; color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 6px; cursor: pointer; width: 100%; }

/* Header & KPI */
header { background: #fff; border-bottom: 1px solid #e0e4ef; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; min-height: 42px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 14px; font-weight: 700; }
.logo em { color: #1565c0; font-style: normal; }
.hbtn { background: #f4f5f9; border: 1px solid #dde; color: #666; font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-left: 5px; }
.dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot.live { background: #27ae60; box-shadow: 0 0 8px #27ae60; }

.kpi-row { display: flex; gap: 10px; padding: 12px; }
.kpi { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e0e4ef; flex: 1; }
.kpi-l { font-size: 10px; color: #666; text-transform: uppercase; }
.kpi-v { font-size: 18px; font-weight: 700; margin: 4px 0; }
.kpi-u { font-size: 10px; color: #888; margin-left: 4px; }

/* Chart Area */
.chart-panel { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; margin: 0 12px 12px; overflow: hidden; }
.panel-hdr { padding: 12px 14px; border-bottom: 1px solid #eef0f8; }
.panel-title { font-size: 13px; font-weight: 600; }
.panel-sub { font-size: 10px; color: #666; }
#vwWrap { position: relative; cursor: crosshair; user-select: none; touch-action: none; }
.panel-legend { background: #f4f5f9; padding: 8px 12px; display: flex; gap: 15px; border-top: 1px solid #eef0f8; }
.pleg { font-size: 10px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.pleg-sq { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>

<div id="setupModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">Hruška <span>· VDT korelace</span></div>
    <div class="modal-sub">Zadej URL svého ČEPS proxy serveru (např. z Render/Vercel).</div>
    <label class="modal-lbl">SERVER URL</label>
    <input id="apiInput" class="modal-inp" type="url" value="https://ceps-live2.onrender.com">
    <button class="btn-p" onclick="saveApi()">Pokračovat</button>
  </div>
</div>

<header>
  <div class="logo">HRUŠKA <em>· residual delta</em></div>
  <div style="display:flex; align-items:center;">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Odpojeno</span>
    <button class="hbtn" onclick="loadData()">↻</button>
    <button class="hbtn" onclick="changeApi()">⚙</button>
  </div>
</header>

<main>
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-l">Poslední VDT Cena</div>
      <div class="kpi-v" id="dv-VDT">—<span class="kpi-u">EUR/MWh</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-l">Residual Delta</div>
      <div class="kpi-v" id="dv-Delta">—<span class="kpi-u">MW</span></div>
    </div>
  </div>

  <div class="chart-panel">
    <div class="panel-hdr">
      <div class="panel-title">Analýza Korelace</div>
      <div class="panel-sub">Y-osa: Normalizovaný rozsah (všechny křivky v jednom poli). Posun: Tažení | Zoom: Kolečko</div>
    </div>
    <div id="vwTip" style="background:#1a1a2e; color:#fff; padding:8px 14px; font-family:'JetBrains Mono'; font-size:11px; min-height:30px; display:flex; gap:15px; align-items:center;">
      Přejeďte myší nad grafem...
    </div>
    <div id="vwWrap">
      <canvas id="vwCanvas" height="450"></canvas>
      <div id="vwLine" style="position:absolute; top:0; bottom:0; width:1px; background:rgba(0,0,0,0.2); display:none; pointer-events:none;"></div>
    </div>
    <div class="panel-legend">
      <label class="pleg"><input type="checkbox" id="tg-vdt" checked onchange="draw()"> <span class="pleg-sq" style="background:#e74c3c;"></span> VDT</label>
      <label class="pleg"><input type="checkbox" id="tg-smard" checked onchange="draw()"> <span class="pleg-sq" style="background:#1a1a2e;"></span> SMARD Residual</label>
      <label class="pleg"><input type="checkbox" id="tg-delta" checked onchange="draw()"> <span class="pleg-sq" style="background:#27ae60;"></span> Delta (Act-Fc)</label>
    </div>
  </div>
</main>

<script>
let API_URL = localStorage.getItem('ceps_api_url') || '';
window._vwData = { vdt: [], smard: [], delta: [] };
window._vwView = { offsetMs: 0, spanH: 24 };

// --- API & Core ---
function saveApi() {
    const val = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
    if (val) { API_URL = val; localStorage.setItem('ceps_api_url', val); }
    document.getElementById('setupModal').style.display = 'none';
    loadData();
}

function changeApi() { document.getElementById('setupModal').style.display = 'flex'; }

async function loadData() {
    if (!API_URL) return;
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Načítám...';

    try {
        const [rVdt, rRes] = await Promise.all([
            fetch(`${API_URL}/vdt`).then(r => r.json()),
            fetch(`${API_URL}/residual`).then(r => r.json())
        ]);

        // Parse VDT
        let vdtPts = [];
        if(rVdt.data) rVdt.data.forEach(d => vdtPts.push({ ts: new Date(d.timestamp).getTime(), v: parseFloat(d.last) }));
        
        // Parse Residual & Delta
        let smardPts = [], deltaPts = [];
        if(rRes.data) {
            rRes.data.forEach(d => {
                const ts = new Date(d.berlin_time || d.ts).getTime();
                if (d.residual_load_actual_mw != null) smardPts.push({ ts, v: d.residual_load_actual_mw });
                if (d.residual_load_actual_mw != null && d.residual_load_mw != null) {
                    deltaPts.push({ ts, v: d.residual_load_actual_mw - d.residual_load_mw });
                }
            });
        }

        window._vwData = { vdt: vdtPts, smard: smardPts, delta: deltaPts };
        
        if (vdtPts.length > 0) document.getElementById('dv-VDT').innerHTML = `${vdtPts[vdtPts.length-1].v.toFixed(2)} <span class="kpi-u">EUR/MWh</span>`;
        if (deltaPts.length > 0) document.getElementById('dv-Delta').innerHTML = `${deltaPts[deltaPts.length-1].v.toFixed(0)} <span class="kpi-u">MW</span>`;

        document.getElementById('statusDot').className = 'dot live';
        document.getElementById('statusText').textContent = 'Live';
        draw();
    } catch (e) {
        console.error(e);
        document.getElementById('statusText').textContent = 'Chyba API';
    }
}

// --- Grafika ---
function draw() {
    const canvas = document.getElementById('vwCanvas');
    const wrap = document.getElementById('vwWrap');
    const dpr = window.devicePixelRatio || 1;
    const W = wrap.clientWidth;
    const H = 450;
    
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const data = window._vwData;
    const view = window._vwView;
    const ml = 45, mr = 20, mt = 20, mb = 30;
    const pw = W - ml - mr, ph = H - mt - mb;

    // Časová osa
    const lastTs = data.vdt.length ? data.vdt[data.vdt.length-1].ts : Date.now();
    const xMax = lastTs + view.offsetMs;
    const xMin = xMax - (view.spanH * 3600000);

    const x2 = ts => ml + ((ts - xMin) / (xMax - xMin)) * pw;

    // Funkce pro dynamické měřítko (vše do 0-100% výšky grafu pro korelaci)
    function getRange(pts) {
        const visible = pts.filter(p => p.ts >= xMin && p.ts <= xMax);
        if (!visible.length) return { min: 0, max: 1 };
        let mn = Math.min(...visible.map(p => p.v)), mx = Math.max(...visible.map(p => p.v));
        const pad = (mx - mn) * 0.1 || 1;
        return { min: mn - pad, max: mx + pad };
    }

    function drawLine(pts, color, width, active) {
        if (!active || !pts.length) return;
        const range = getRange(pts);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.beginPath();
        let first = true;
        pts.forEach(p => {
            if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) return;
            const x = x2(p.ts), y = mt + ph - ((p.v - range.min) / (range.max - range.min)) * ph;
            if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // Grid
    ctx.strokeStyle = '#eee';
    for(let i=0; i<=4; i++) {
        let y = mt + (ph * i / 4);
        ctx.beginPath(); ctx.moveTo(ml, y); ctx.lineTo(W-mr, y); ctx.stroke();
    }

    drawLine(data.smard, '#1a1a2e', 1.5, document.getElementById('tg-smard').checked);
    drawLine(data.delta, '#27ae60', 1.5, document.getElementById('tg-delta').checked);
    drawLine(data.vdt, '#e74c3c', 2.5, document.getElementById('tg-vdt').checked);

    // X-osa popisky
    ctx.fillStyle = '#888';
    ctx.font = '10px Inter';
    for (let i = 0; i <= 6; i++) {
        const ts = xMin + (xMax - xMin) * (i / 6);
        ctx.fillText(new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), x2(ts)-15, H-10);
    }

    window._lastDraw = { xMin, xMax, ml, pw, data, x2 };
}

// --- Interakce ---
const wrap = document.getElementById('vwWrap');
let isDragging = false, lastX = 0;

wrap.onmousedown = e => { isDragging = true; lastX = e.clientX; };
window.onmouseup = () => isDragging = false;
window.onmousemove = e => {
    if (isDragging) {
        const dx = e.clientX - lastX;
        const msPerPx = (window._vwView.spanH * 3600000) / wrap.clientWidth;
        window._vwView.offsetMs -= dx * msPerPx;
        lastX = e.clientX;
        draw();
    }
    
    // Tooltip logic
    const d = window._lastDraw;
    if (!d) return;
    const rect = wrap.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    if (mouseX >= d.ml && mouseX <= d.ml + d.pw) {
        const line = document.getElementById('vwLine');
        line.style.display = 'block';
        line.style.left = mouseX + 'px';
        const hoverTs = d.xMin + (mouseX - d.ml) / d.pw * (d.xMax - d.xMin);
        
        const findVal = pts => {
            const p = pts.reduce((prev, curr) => Math.abs(curr.ts - hoverTs) < Math.abs(prev.ts - hoverTs) ? curr : prev, pts[0]);
            return p ? p.v.toFixed(1) : '—';
        };

        document.getElementById('vwTip').innerHTML = `
            <span>🕒 ${new Date(hoverTs).toLocaleTimeString()}</span>
            <span style="color:#e74c3c">VDT: ${findVal(d.data.vdt)}</span>
            <span style="color:#1a1a2e">SMARD: ${findVal(d.data.smard)}</span>
            <span style="color:#27ae60">Delta: ${findVal(d.data.delta)}</span>
        `;
    }
};

wrap.onwheel = e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.2 : 0.8;
    window._vwView.spanH = Math.max(1, Math.min(168, window._vwView.spanH * factor));
    draw();
};

window.onload = () => {
    if (!API_URL) changeApi();
    else loadData();
    window.onresize = draw;
};
</script>
</body>
</html>
