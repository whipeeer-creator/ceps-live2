<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hruška · VDT × Residual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f6; font-family: 'Inter', sans-serif; font-size: 12px; color: #1a1a2e; }

/* Setup modal */
#setupModal { position: fixed; inset: 0; background: rgba(30,40,80,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: #fff; border-radius: 10px; padding: 26px 28px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-title span { color: #1565c0; }
.modal-sub { font-size: 11px; color: #555; margin-bottom: 16px; line-height: 1.6; }
.modal-lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; display: block; }
.modal-inp { width: 100%; background: #f4f5f9; border: 1px solid #dde; color: #1a1a2e; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 11px; border-radius: 6px; outline: none; margin-bottom: 10px; }
.modal-inp:focus { border-color: #1565c0; }
.modal-btns { display: flex; gap: 8px; }
.btn-p { background: #1565c0; color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 6px; cursor: pointer; flex: 1; }
.btn-p:hover { background: #1251a0; }

/* Header */
header { background: #fff; border-bottom: 1px solid #e0e4ef; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; min-height: 42px; gap: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.logo { font-size: 14px; font-weight: 700; letter-spacing: .04em; }
.logo em { color: #1565c0; font-style: normal; }
.hbtn { background: #f4f5f9; border: 1px solid #dde; color: #666; font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
.hbtn:hover { border-color: #1565c0; color: #1565c0; }
.hdr-info { font-size: 10px; color: #666; font-family: 'JetBrains Mono', monospace; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #43a047; display: inline-block; margin-right: 5px; }
.dot.err { background: #e53935; }
.dot.idle { background: #bbb; }

main { padding: 12px; }

/* Chart panel */
.chart-panel { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; }
.panel-hdr { background: #fff; border-bottom: 1px solid #eef0f8; padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.panel-title { font-size: 13px; font-weight: 600; color: #1a1a2e; }
.panel-sub { font-size: 10px; color: #666; }
.panel-legend { background: #f4f5f9; border-top: 1px solid #eef0f8; padding: 7px 12px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.pleg { font-size: 10px; color: #555; display: flex; align-items: center; gap: 5px; }
.pleg-sq { width: 18px; height: 10px; border-radius: 1px; flex-shrink: 0; }

canvas { max-width: 100%; display: block; }

/* KPI karta */
.kpi-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 10px; }
.kpi { background: #fff; border: 1px solid #e0e4ef; border-radius: 7px; padding: 12px 14px; border-left: 3px solid #1565c0; }
.kpi-l { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
.kpi-v { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; color: #1a1a2e; }
.kpi-u { font-size: 11px; font-weight: 400; color: #666; margin-left: 4px; }
.kpi-s { font-size: 11px; color: #666; margin-top: 4px; font-family: 'JetBrains Mono', monospace; line-height: 1.45; }

@media(max-width:700px){ .panel-legend { gap: 8px; } }
</style>
</head>
<body>

<div id="setupModal">
  <div class="modal-box">
    <div class="modal-title">Hruška <span>· VDT korelace</span></div>
    <div class="modal-sub">Zadej URL svého ČEPS proxy serveru.</div>
    <label class="modal-lbl">SERVER URL</label>
    <input id="apiInput" class="modal-inp" type="url" value="https://ceps-live2.onrender.com" placeholder="https://...">
    <div class="modal-btns">
      <button class="btn-p" onclick="saveApi()">Pokračovat</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">HRUŠKA <em>· residual delta</em></div>
  <div class="hdr-info">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">—</span>
  </div>
  <div>
    <button class="hbtn" onclick="loadVdtWind()">↻ Refresh</button>
    <button class="hbtn" onclick="changeApi()">⚙</button>
  </div>
</header>

<main>
  <div class="kpi-row">
    <div class="kpi" id="crd-VDT">
      <div class="kpi-l">VDT poslední</div>
      <div class="kpi-v" id="dv-VDT">—<span class="kpi-u">EUR/MWh</span></div>
      <div class="kpi-s" id="ds-VDT">—</div>
    </div>
  </div>

  <div class="chart-panel">
    <div class="panel-hdr">
      <div>
        <div class="panel-title">VDT cena × Residual Load × Forecast Delta (normalizováno)</div>
        <div class="panel-sub">Y-osa = percentil (0%=min za 30dní, 100%=max). Stejný směr křivek = silná korelace. Hover = absolutní hodnoty.</div>
      </div>
      <div id="vwStats" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;display:flex;gap:14px;flex-wrap:wrap;"></div>
    </div>
    <div style="background:#dce8f5; position:relative; overflow:hidden; width:100%;" id="vwWrap">
      <canvas id="vwCanvas" height="500" style="width:100%;height:500px;display:block;"></canvas>
      <div id="vwTip" style="position:absolute;display:none;pointer-events:none;background:#1a1a2e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 8px;border-radius:4px;white-space:nowrap;top:6px;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.2);line-height:1.4;"></div>
      <div id="vwLine" style="position:absolute;display:none;pointer-events:none;width:1px;background:rgba(26,26,46,0.3);top:0;bottom:0;z-index:9;"></div>
    </div>
    <div class="panel-legend" id="vwLegend">
      <label class="pleg vw-tg" style="cursor:pointer;user-select:none;">
        <input type="checkbox" id="vw-tg-vdt" checked style="margin-right:4px;">
        <span class="pleg-sq" style="background:#e74c3c;"></span>VDT cena ČR <span id="lv-vdt" style="margin-left:4px;font-weight:600;color:#e74c3c;font-family:'JetBrains Mono',monospace;">—</span>
      </label>
      <label class="pleg vw-tg" style="cursor:pointer;user-select:none;">
        <input type="checkbox" id="vw-tg-rlact" checked style="margin-right:4px;">
        <span class="pleg-sq" style="background:#34495e;"></span>Residual DE actual <span id="lv-rlact" style="margin-left:4px;font-weight:600;color:#34495e;font-family:'JetBrains Mono',monospace;">—</span>
      </label>
      <label class="pleg vw-tg" style="cursor:pointer;user-select:none;">
        <input type="checkbox" id="vw-tg-rlfc" checked style="margin-right:4px;">
        <span class="pleg-sq" style="background:#7f8c8d;opacity:.7"></span>Residual DE forecast <span id="lv-rlfc" style="margin-left:4px;font-weight:600;color:#7f8c8d;font-family:'JetBrains Mono',monospace;">—</span>
      </label>
      <label class="pleg vw-tg" style="cursor:pointer;user-select:none;border-left:2px solid #ddd;padding-left:8px;margin-left:8px;">
        <input type="checkbox" id="vw-tg-rldelta" checked style="margin-right:4px;">
        <span class="pleg-sq" style="background:#27ae60;"></span>📊 Residual delta (FC vs Actual) <span id="lv-rldelta" style="margin-left:4px;font-weight:600;color:#27ae60;font-family:'JetBrains Mono',monospace;">—</span>
      </label>
    </div>
  </div>
</main>

<script>
let API_URL = localStorage.getItem('ceps_api_url') || '';

function setStatus(text, type = '') {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (dot) dot.className = 'dot' + (type ? ' ' + type : '');
  if (txt) txt.textContent = text;
}

function changeApi() {
  document.getElementById('apiInput').value = API_URL;
  document.getElementById('setupModal').style.display = 'flex';
}

function saveApi() {
  const url = document.getElementById('apiInput').value.trim().replace(/\/$/, '');
  if (url) {
    API_URL = url;
    localStorage.setItem('ceps_api_url', url);
  }
  document.getElementById('setupModal').style.display = 'none';
  loadVdtWind();
}

function setupCanvas(canvas, h) {
  const dpr = window.devicePixelRatio || 1;
  if (!canvas.dataset.fixedH) canvas.dataset.fixedH = h;
  const H = parseInt(canvas.dataset.fixedH);
  const W = canvas.parentElement.clientWidth;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W, H };
}

</script>

<script>
async function loadVdtWind() {
  setStatus("Načítám…", "idle");
  if (!API_URL) return;
  try {
    // Stáhnout VDT za posledních 30 dní jedním fetchem + DE wind/solar
    const [vdtRange, residual] = await Promise.all([
      fetch(`${API_URL}/ote/vdt/range?days_back=30`, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null),
      fetch(`${API_URL}/entsoe/residual-load`, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null),
    ]);
    
    // Update VDT KPI kartu (poslední cena + čas)
    if (vdtRange && vdtRange.data && vdtRange.data.length) {
      // Najít poslední bod s "last" cenou (pole je seřazené chronologicky)
      let lastPt = null;
      for (let i = vdtRange.data.length - 1; i >= 0; i--) {
        const r = vdtRange.data[i];
        if (r.last != null && !isNaN(parseFloat(r.last))) {
          lastPt = r;
          break;
        }
      }
      if (lastPt) {
        const v = parseFloat(lastPt.last);
        const dt = new Date(lastPt.timestamp);
        const dStr = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.`;
        const tStr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        const dvEl = document.getElementById('dv-VDT');
        const dsEl = document.getElementById('ds-VDT');
        if (dvEl) dvEl.innerHTML = `${v.toFixed(1)}<span class="kpi-u">EUR/MWh</span>`;
        if (dsEl) dsEl.textContent = `${dStr} ${tStr}`;
      }
    }
    
    // Konvertuj range odpověď na pole jako dříve (kompatibilita s drawVdtWind)
    const vdtAll = vdtRange ? [vdtRange] : [];
    
    drawVdtWind(document.getElementById('vwCanvas'), vdtAll, residual);
    setStatus('Live · ' + new Date().toLocaleTimeString('cs'), '');
  } catch (e) {
    console.warn('vdtwind:', e);
    setStatus('Chyba', 'err');
  }
}

// Stav viewportu pro pan/zoom (perzistuje mezi rendery)
window._vwView = window._vwView || { offsetMs: 0, spanH: 24 };  // default: 24h okno (jeden den)

function drawVdtWind(canvas, vdtAll, residual) {
  if (!canvas) return;
  
  // Uloz data pro re-render z toggle / pan
  if (vdtAll !== undefined || residual !== undefined) {
    window._vwData = { vdtAll, residual };
  }
  const data = window._vwData || {};
  vdtAll = data.vdtAll;
  residual = data.residual;
  
  // Toggle states
  const showVdt    = document.getElementById('vw-tg-vdt')?.checked ?? true;
  const showRlAct  = document.getElementById('vw-tg-rlact')?.checked ?? true;
  const showRlFc   = document.getElementById('vw-tg-rlfc')?.checked ?? true;
  const showRlDelta = document.getElementById('vw-tg-rldelta')?.checked ?? true;
  // Vypnuté indikátory (zachováno aby drawVdtWind nehavarovala)
  const showWAct = false, showWDa = false, showWId = false;
  const showTrend = false, showBoll = false, showMavg = false, showRsi = false;
  
  const { ctx, W, H } = setupCanvas(canvas, parseInt(canvas.getAttribute('height')) || 380);
  ctx.clearRect(0, 0, W, H);
  
  const ml = 50, mr = 60, mt = 16, mb = 28;
  const pw = W - ml - mr;
  const ph = H - mt - mb;
  
  // Sebrat všechna VDT data
  const vdtPts = [];
  if (Array.isArray(vdtAll)) {
    for (const arr of vdtAll) {
      if (!arr || !arr.data) continue;
      for (const r of arr.data) {
        if (!r.timestamp || r.last == null || isNaN(parseFloat(r.last))) continue;
        vdtPts.push({ ts: new Date(r.timestamp).getTime(), v: parseFloat(r.last) });
      }
    }
  }
  vdtPts.sort((a,b) => a.ts - b.ts);
  
  const windActPts = [];
  const windDaPts = [];
  const windIdPts = [];
  const rlActPts = [];   // Residual Load ACTUAL
  const rlFcPts = [];    // Residual Load FORECAST
  if (residual && residual.data) {
    for (const r of residual.data) {
      const ts = new Date(r.berlin_time || r.ts).getTime();
      if (isNaN(ts)) continue;
      if (r.wind_actual_mw != null) windActPts.push({ ts, v: r.wind_actual_mw });
      if (r.wind_mw != null) windDaPts.push({ ts, v: r.wind_mw });
      if (r.wind_id_mw != null) windIdPts.push({ ts, v: r.wind_id_mw });
      if (r.residual_load_actual_mw != null) rlActPts.push({ ts, v: r.residual_load_actual_mw });
      if (r.residual_load_mw != null) rlFcPts.push({ ts, v: r.residual_load_mw });
    }
  }
  
  // Spočítat min/max pro každou sérii (z VŠECH dat)
  function minMaxAll(pts) {
    if (!pts.length) return { min: 0, max: 1 };
    let mn = Infinity, mx = -Infinity;
    for (const p of pts) {
      if (p.v < mn) mn = p.v;
      if (p.v > mx) mx = p.v;
    }
    if (mn === mx) mx = mn + 1;
    return { min: mn, max: mx };
  }
  
  function minMaxView(pts, xMin, xMax) {
    let mn = Infinity, mx = -Infinity;
    for (const p of pts) {
      if (p.ts < xMin || p.ts > xMax) continue;
      if (p.v < mn) mn = p.v;
      if (p.v > mx) mx = p.v;
    }
    if (mn === Infinity) return null;
    // Zaokrouhli na pěkná čísla a přidej padding
    const range = Math.max(1, mx - mn);
    const pad = range * 0.08;
    return { min: mn - pad, max: mx + pad };
  }
  
  // (vwStats odstraněn - info je v KPI kartě nahoře a v legendě dole)
  
  // Žádná data?
  if (vdtPts.length === 0 && windActPts.length === 0 && rlActPts.length === 0) {
    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Žádná data', W/2, H/2);
    return;
  }
  
  // X domain podle viewportu
  const view = window._vwView;
  let dataMin = Infinity, dataMax = -Infinity;
  for (const arr of [vdtPts, windActPts, windDaPts, windIdPts, rlActPts, rlFcPts]) {
    for (const p of arr) {
      if (p.ts < dataMin) dataMin = p.ts;
      if (p.ts > dataMax) dataMax = p.ts;
    }
  }
  if (!isFinite(dataMin)) { dataMin = Date.now() - 86400000; dataMax = Date.now(); }
  
  const spanMs = view.spanH * 3600000;
  
  let xMax = dataMax + view.offsetMs;
  let xMin = xMax - spanMs;
  if (xMin < dataMin - 3600000) {
    xMin = dataMin - 3600000;
    xMax = xMin + spanMs;
  }
  if (xMax > dataMax + 3600000) {
    xMax = dataMax + 3600000;
    xMin = xMax - spanMs;
  }
  
  // Ranges z VIDITELNÝCH dat (každá série má vlastní min/max ve viewportu)
  // Fallback na all-data range pokud ve viewportu nic není
  const vdtRange     = minMaxView(vdtPts, xMin, xMax)     || minMaxAll(vdtPts);
  const windActRange = minMaxView(windActPts, xMin, xMax) || minMaxAll(windActPts);
  const windDaRange  = minMaxView(windDaPts, xMin, xMax)  || minMaxAll(windDaPts);
  const windIdRange  = minMaxView(windIdPts, xMin, xMax)  || minMaxAll(windIdPts);
  const rlActRange   = minMaxView(rlActPts, xMin, xMax)   || minMaxAll(rlActPts);
  const rlFcRange    = minMaxView(rlFcPts, xMin, xMax)    || minMaxAll(rlFcPts);
  
  // Helpers - normalizace 0-1
  const x2 = (ts) => ml + ((ts - xMin) / (xMax - xMin)) * pw;
  // Y normalizovaná: 0 = top (max), 1 = bottom (min)
  const yNorm = (v, range) => {
    const norm = (v - range.min) / (range.max - range.min);
    return mt + (1 - norm) * ph;  // 0=top, 1=bottom -> norm=1 znamená nahoře
  };
  
  // Barevné pásy: 80-100% = červená (drahé), 0-20% = zelená (levné)
  // Velmi transparentní, jen jako náznak zón
  ctx.fillStyle = 'rgba(231, 76, 60, 0.07)';  // top - SELL zone
  ctx.fillRect(ml, mt, pw, ph * 0.2);
  ctx.fillStyle = 'rgba(46, 204, 113, 0.07)';  // bottom - BUY zone
  ctx.fillRect(ml, mt + ph * 0.8, pw, ph * 0.2);
  
  // Grid + percentil labels (0-100%)
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  ctx.font = '10px monospace';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const y = mt + (ph * i / 5);
    ctx.beginPath(); ctx.moveTo(ml, y); ctx.lineTo(W - mr, y); ctx.stroke();
    const pct = 100 - i * 20;
    ctx.fillText(pct + '%', ml - 4, y + 3);
  }
  
  // X-axis labels
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  const totalH = (xMax - xMin) / 3600000;
  const stepH = totalH > 96 ? 24 : (totalH > 48 ? 6 : (totalH > 24 ? 3 : (totalH > 12 ? 2 : 1)));
  const startTs = Math.floor(xMin / (stepH * 3600000)) * (stepH * 3600000);
  for (let t = startTs; t <= xMax; t += stepH * 3600000) {
    if (t < xMin) continue;
    const x = x2(t);
    if (x < ml || x > W - mr) continue;
    const dt = new Date(t);
    let label;
    if (totalH > 72) {
      label = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}`;
    } else {
      if (dt.getHours() === 0) {
        label = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}`;
      } else {
        label = `${String(dt.getHours()).padStart(2,'0')}:00`;
      }
    }
    ctx.fillText(label, x, H - 8);
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.beginPath(); ctx.moveTo(x, mt); ctx.lineTo(x, mt + ph); ctx.stroke();
  }
  
  // "Now" line
  const nowTs = Date.now();
  if (nowTs >= xMin && nowTs <= xMax) {
    const xn = x2(nowTs);
    ctx.strokeStyle = 'rgba(231, 76, 60, 0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(xn, mt); ctx.lineTo(xn, mt + ph); ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Draw line helper s normalizací
  function drawLineNorm(pts, range, color, width, dash) {
    if (!pts.length) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    for (const p of pts) {
      if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
      const x = x2(p.ts);
      const y = yNorm(p.v, range);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Vrstvy zezadu dopředu
  if (showRlFc)  drawLineNorm(rlFcPts, rlFcRange,   '#7f8c8d', 1.5, [5, 3]);
  if (showRlAct) drawLineNorm(rlActPts, rlActRange, '#34495e', 2.5);
  if (showWDa)   drawLineNorm(windDaPts, windDaRange, '#f39c12', 1.5, [5, 3]);
  if (showWId)   drawLineNorm(windIdPts, windIdRange, '#3498db', 1.5, [2, 2]);
  if (showWAct)  drawLineNorm(windActPts, windActRange, '#16a085', 2);
  if (showVdt)   drawLineNorm(vdtPts, vdtRange, '#e74c3c', 2.5);
  
  // ============ RESIDUAL DELTA (forecast - actual) ============
  // Pro každý timestamp kde existuje actual i forecast, spočítej delta
  const rlDeltaPts = [];
  if (rlActPts.length && rlFcPts.length) {
    // Index forecast podle ts
    const fcMap = new Map();
    for (const p of rlFcPts) fcMap.set(p.ts, p.v);
    // Pro každý actual najdi nejbližší forecast (do 1h)
    for (const a of rlActPts) {
      let fc = fcMap.get(a.ts);
      if (fc == null) {
        // Najdi nejbližší forecast (do 1h)
        let bestDiff = 3600 * 1000; let bestFc = null;
        for (const f of rlFcPts) {
          const d = Math.abs(f.ts - a.ts);
          if (d < bestDiff) { bestDiff = d; bestFc = f.v; }
        }
        if (bestFc != null) fc = bestFc;
      }
      if (fc != null) {
        // Delta = actual - forecast
        // Kladné = realita VYŠŠÍ než forecast (víc residualu = drahší cena než trh čekal = bullish)
        // Záporné = realita NIŽŠÍ než forecast (méně residualu = levnější než trh čekal = bearish)
        rlDeltaPts.push({ ts: a.ts, v: a.v - fc });
      }
    }
  }
  
  if (showRlDelta && rlDeltaPts.length > 1) {
    const deltaRange = minMaxView(rlDeltaPts, xMin, xMax) || minMaxAll(rlDeltaPts);
    // Center na 0 - symetricky
    const absMax = Math.max(Math.abs(deltaRange.min), Math.abs(deltaRange.max));
    const deltaRangeC = { min: -absMax, max: absMax };
    
    // Zero-line (kde je delta = 0)
    const zeroY = yNorm(0, deltaRangeC);
    ctx.strokeStyle = 'rgba(39, 174, 96, 0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.beginPath();
    ctx.moveTo(ml, zeroY);
    ctx.lineTo(W - mr, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Delta křivka
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    let started = false;
    for (const p of rlDeltaPts) {
      if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
      const x = x2(p.ts), y = yNorm(p.v, deltaRangeC);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    
    // (Label u konce křivky odstraněn - hodnota je v legendě)
  }
  
  // Aktualizuj live hodnoty v legendě - PERCENTILY (0-100% jak na grafu)
  function updateLegendValue(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val == null ? '—' : val;
  }
  function pctOf(v, range) {
    if (v == null || !range) return null;
    const p = ((v - range.min) / (range.max - range.min)) * 100;
    return Math.max(0, Math.min(100, p)).toFixed(0) + '%';
  }
  
  // Najdi nejnovější body
  const lastVdt = vdtPts.length ? vdtPts[vdtPts.length - 1] : null;
  const lastRlAct = rlActPts.length ? rlActPts[rlActPts.length - 1] : null;
  // Pro forecast vezmi bod nejblíž "teď" (forecast je do budoucna)
  const nowMs = Date.now();
  let lastRlFc = null;
  if (rlFcPts.length) {
    let best = null, bestDiff = Infinity;
    for (const p of rlFcPts) {
      const diff = Math.abs(p.ts - nowMs);
      if (diff < bestDiff) { bestDiff = diff; best = p; }
    }
    lastRlFc = best;
  }
  const lastDelta = rlDeltaPts.length ? rlDeltaPts[rlDeltaPts.length - 1] : null;
  
  // Percentilní hodnoty (kde je to na Y-ose grafu 0-100%)
  updateLegendValue('lv-vdt',    lastVdt   ? pctOf(lastVdt.v,   vdtRange)   : null);
  updateLegendValue('lv-rlact',  lastRlAct ? pctOf(lastRlAct.v, rlActRange) : null);
  updateLegendValue('lv-rlfc',   lastRlFc  ? pctOf(lastRlFc.v,  rlFcRange)  : null);
  // Pro delta: percentil v rámci jejího vlastního rozsahu (centered na 0)
  if (lastDelta && rlDeltaPts.length > 1) {
    const dRange = minMaxView(rlDeltaPts, xMin, xMax) || minMaxAll(rlDeltaPts);
    const absMx = Math.max(Math.abs(dRange.min), Math.abs(dRange.max));
    updateLegendValue('lv-rldelta', pctOf(lastDelta.v, { min: -absMx, max: absMx }));
  } else {
    updateLegendValue('lv-rldelta', null);
  }
  
  // ============ AUTO-TREND (lineární regrese přes viditelná data) ============
  function linRegression(pts, xMin, xMax) {
    const visible = pts.filter(p => p.ts >= xMin && p.ts <= xMax && p.v != null);
    if (visible.length < 3) return null;
    // Normalize x to 0..1 for stability
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0, n = visible.length;
    const span = xMax - xMin;
    for (const p of visible) {
      const x = (p.ts - xMin) / span;
      const y = p.v;
      sumX += x; sumY += y; sumXY += x*y; sumXX += x*x;
    }
    const slope = (n*sumXY - sumX*sumY) / (n*sumXX - sumX*sumX);
    const intercept = (sumY - slope*sumX) / n;
    // y(t) = intercept + slope * (t-xMin)/span
    return { slope, intercept, xMin, xMax, span, n };
  }
  
  function drawTrendLine(reg, range, color, label) {
    if (!reg) return;
    const yStart = reg.intercept;            // při x=0
    const yEnd   = reg.intercept + reg.slope; // při x=1
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(x2(reg.xMin), yNorm(yStart, range));
    ctx.lineTo(x2(reg.xMax), yNorm(yEnd, range));
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Slope label - kolik se mění za hodinu
    const hrSpan = reg.span / 3600000;
    const slopePerH = (reg.slope / hrSpan).toFixed(1);
    const arrow = reg.slope > 0 ? '↑' : '↓';
    ctx.fillStyle = color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${label} ${arrow} ${slopePerH}/h`, x2(reg.xMin) + 5, yNorm(yStart, range) - 4);
  }
  
  if (showTrend) {
    if (showVdt && vdtPts.length) {
      const reg = linRegression(vdtPts, xMin, xMax);
      drawTrendLine(reg, vdtRange, '#9b59b6', 'VDT');
    }
    if (showRlAct && rlActPts.length) {
      const reg = linRegression(rlActPts, xMin, xMax);
      drawTrendLine(reg, rlActRange, '#2c3e50', 'RL');
    }
    if (showWAct && windActPts.length) {
      const reg = linRegression(windActPts, xMin, xMax);
      drawTrendLine(reg, windActRange, '#16a085', 'Wind');
    }
  }
  
  // ============ BOLLINGER BANDS (na VDT) ============
  function rollingMean(pts, windowMs) {
    const out = [];
    for (let i = 0; i < pts.length; i++) {
      const center = pts[i].ts;
      let sum = 0, sumSq = 0, n = 0;
      for (let j = 0; j < pts.length; j++) {
        if (Math.abs(pts[j].ts - center) <= windowMs / 2) {
          sum += pts[j].v;
          sumSq += pts[j].v * pts[j].v;
          n++;
        }
      }
      if (n < 3) continue;
      const mean = sum / n;
      const variance = (sumSq / n) - mean * mean;
      const std = Math.sqrt(Math.max(0, variance));
      out.push({ ts: pts[i].ts, mean, std });
    }
    return out;
  }
  
  if (showBoll && showVdt && vdtPts.length > 5) {
    // Bollinger ± 2σ s 24h windowem
    const bb = rollingMean(vdtPts, 24 * 3600 * 1000);
    if (bb.length > 1) {
      // Spodní pás
      ctx.strokeStyle = 'rgba(230, 126, 34, 0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      let s = false;
      for (const p of bb) {
        if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
        const v = p.mean - 2 * p.std;
        const x = x2(p.ts), y = yNorm(v, vdtRange);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // Horní pás
      ctx.beginPath();
      s = false;
      for (const p of bb) {
        if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
        const v = p.mean + 2 * p.std;
        const x = x2(p.ts), y = yNorm(v, vdtRange);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // Středová čára (rolling mean)
      ctx.strokeStyle = 'rgba(230, 126, 34, 0.8)';
      ctx.setLineDash([]);
      ctx.beginPath();
      s = false;
      for (const p of bb) {
        if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
        const x = x2(p.ts), y = yNorm(p.mean, vdtRange);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  
  // ============ MOVING AVERAGE Residualu ============
  if (showMavg && showRlAct && rlActPts.length > 5) {
    const ma = rollingMean(rlActPts, 12 * 3600 * 1000);  // 12h window
    if (ma.length > 1) {
      ctx.strokeStyle = '#1abc9c';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]);
      ctx.beginPath();
      let s = false;
      for (const p of ma) {
        if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
        const x = x2(p.ts), y = yNorm(p.mean, rlActRange);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  
  // ============ RSI VDT (14-period) ============
  function calcRSI(pts, period) {
    if (pts.length < period + 1) return [];
    const out = [];
    let avgGain = 0, avgLoss = 0;
    // První průměr
    for (let i = 1; i <= period; i++) {
      const ch = pts[i].v - pts[i-1].v;
      if (ch >= 0) avgGain += ch; else avgLoss -= ch;
    }
    avgGain /= period;
    avgLoss /= period;
    let rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
    out.push({ ts: pts[period].ts, rsi: 100 - 100/(1+rs) });
    // Wilder smoothing pro zbytek
    for (let i = period + 1; i < pts.length; i++) {
      const ch = pts[i].v - pts[i-1].v;
      const gain = ch > 0 ? ch : 0;
      const loss = ch < 0 ? -ch : 0;
      avgGain = (avgGain * (period - 1) + gain) / period;
      avgLoss = (avgLoss * (period - 1) + loss) / period;
      rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
      out.push({ ts: pts[i].ts, rsi: 100 - 100/(1+rs) });
    }
    return out;
  }
  
  if (showRsi && vdtPts.length > 15) {
    const rsi = calcRSI(vdtPts, 14);
    if (rsi.length > 1) {
      // Mapování RSI 0-100 přímo na percentilovou Y-osu (která je taky 0-100)
      const yRsi = (v) => mt + (1 - v/100) * ph;
      
      // Horizontální linky 30 a 70
      ctx.strokeStyle = 'rgba(211, 84, 0, 0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.moveTo(ml, yRsi(70)); ctx.lineTo(W - mr, yRsi(70)); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ml, yRsi(30)); ctx.lineTo(W - mr, yRsi(30)); ctx.stroke();
      ctx.setLineDash([]);
      
      // RSI křivka
      ctx.strokeStyle = '#d35400';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      let s = false;
      for (const p of rsi) {
        if (p.ts < xMin - 3600000 || p.ts > xMax + 3600000) continue;
        const x = x2(p.ts), y = yRsi(p.rsi);
        if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      
      // Label aktuálního RSI vpravo
      const last = rsi[rsi.length - 1];
      if (last) {
        ctx.fillStyle = '#d35400';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'left';
        const lbl = last.rsi > 70 ? '🔴 OVERBOUGHT' : (last.rsi < 30 ? '🟢 OVERSOLD' : '');
        ctx.fillText(`RSI ${last.rsi.toFixed(0)} ${lbl}`, ml + 4, yRsi(last.rsi) - 4);
      }
    }
  }
  
  // Legend - rozsah pod grafem (např. "VDT: -100 to 500€")
  const fmtRange = (r, unit, scale) => `${(r.min*scale).toFixed(0)}-${(r.max*scale).toFixed(0)}${unit}`;
  
  // Uloz pro hover
  window._vwHover = {
    xMin, xMax, ml, mr, mt, mb, pw, ph, W, H,
    vdtPts, windActPts, windDaPts, windIdPts, rlActPts, rlFcPts,
    vdtRange, windActRange, windDaRange, windIdRange, rlActRange, rlFcRange,
    showVdt, showWAct, showWDa, showWId, showRlAct, showRlFc,
    dataMin, dataMax,
    yNorm
  };
}

// Hover + pan setup (jen jednou)
function setupVwInteraction() {
  const canvas = document.getElementById('vwCanvas');
  if (!canvas || canvas._vwSetup) return;
  canvas._vwSetup = true;
  
  const tip = document.getElementById('vwTip');
  const line = document.getElementById('vwLine');
  
  // Hover
  canvas.addEventListener('mousemove', (e) => {
    const h = window._vwHover;
    if (!h) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    if (mx < h.ml || mx > h.W - h.mr) {
      tip.style.display = 'none';
      line.style.display = 'none';
      return;
    }
    
    // Najít nejbližší ts
    const ts = h.xMin + ((mx - h.ml) / h.pw) * (h.xMax - h.xMin);
    
    function nearest(arr) {
      if (!arr.length) return null;
      let best = null, bestD = Infinity;
      for (const p of arr) {
        const d = Math.abs(p.ts - ts);
        if (d < bestD) { bestD = d; best = p; }
      }
      return (best && bestD < 3600000 * 2) ? best : null;
    }
    
    const dt = new Date(ts);
    const dStr = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
    const tStr = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    
    let html = `<div style="font-weight:600;margin-bottom:2px;">${dStr} ${tStr}</div>`;
    
    // Helper: vrátí percentil hodnoty v rozsahu (0-100)
    const pct = (v, range) => {
      if (!range || range.max === range.min) return 50;
      const n = (v - range.min) / (range.max - range.min) * 100;
      return Math.max(0, Math.min(100, n));
    };
    
    if (h.showVdt) {
      const p = nearest(h.vdtPts);
      if (p) html += `<div style="color:#ff6b6b;">VDT: <b>${p.v.toFixed(1)} €</b> · ${pct(p.v, h.vdtRange).toFixed(0)}%</div>`;
    }
    if (h.showRlAct) {
      const p = nearest(h.rlActPts);
      if (p) html += `<div style="color:#a4b0be;">Residual actual: <b>${(p.v/1000).toFixed(1)} GW</b> · ${pct(p.v, h.rlActRange).toFixed(0)}%</div>`;
    }
    if (h.showRlFc) {
      const p = nearest(h.rlFcPts);
      if (p) html += `<div style="color:#dfe4ea;">Residual fcst: <b>${(p.v/1000).toFixed(1)} GW</b> · ${pct(p.v, h.rlFcRange).toFixed(0)}%</div>`;
    }
    if (h.showWAct) {
      const p = nearest(h.windActPts);
      if (p) html += `<div style="color:#16a085;">Wind actual: <b>${(p.v/1000).toFixed(2)} GW</b> · ${pct(p.v, h.windActRange).toFixed(0)}%</div>`;
    }
    if (h.showWDa) {
      const p = nearest(h.windDaPts);
      if (p) html += `<div style="color:#f39c12;">Wind DA: <b>${(p.v/1000).toFixed(2)} GW</b> · ${pct(p.v, h.windDaRange).toFixed(0)}%</div>`;
    }
    if (h.showWId) {
      const p = nearest(h.windIdPts);
      if (p) html += `<div style="color:#3498db;">Wind ID: <b>${(p.v/1000).toFixed(2)} GW</b> · ${pct(p.v, h.windIdRange).toFixed(0)}%</div>`;
    }
    
    tip.innerHTML = html;
    tip.style.display = 'block';
    
    // Pozice tipu
    const tipW = tip.offsetWidth;
    let tipLeft = mx + 12;
    if (tipLeft + tipW > h.W - 4) tipLeft = mx - tipW - 12;
    tip.style.left = tipLeft + 'px';
    
    line.style.display = 'block';
    line.style.left = mx + 'px';
  });
  
  canvas.addEventListener('mouseleave', () => {
    tip.style.display = 'none';
    line.style.display = 'none';
  });
  
  // Pan (mouse drag)
  let panning = false;
  let panStartX = 0;
  let panStartOffset = 0;
  
  canvas.addEventListener('mousedown', (e) => {
    panning = true;
    panStartX = e.clientX;
    panStartOffset = window._vwView.offsetMs;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  });
  
  // RAF throttling pro pan - hladké překreslování
  let _rafPending = false;
  function scheduleRedraw() {
    if (_rafPending) return;
    _rafPending = true;
    requestAnimationFrame(() => {
      _rafPending = false;
      drawVdtWind(document.getElementById('vwCanvas'));
    });
  }
  
  window.addEventListener('mousemove', (e) => {
    if (!panning) return;
    const h = window._vwHover;
    if (!h) return;
    const dx = e.clientX - panStartX;
    const msPerPx = (h.xMax - h.xMin) / h.pw;
    window._vwView.offsetMs = panStartOffset - dx * msPerPx;
    scheduleRedraw();
  });
  
  window.addEventListener('mouseup', () => {
    if (panning) {
      panning = false;
      canvas.style.cursor = 'grab';
    }
  });
  
  // Touch pan (mobile)
  let touchStartX = 0, touchStartOffset = 0, touching = false;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touching = true;
      touchStartX = e.touches[0].clientX;
      touchStartOffset = window._vwView.offsetMs;
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (!touching || e.touches.length !== 1) return;
    const h = window._vwHover;
    if (!h) return;
    const dx = e.touches[0].clientX - touchStartX;
    const msPerPx = (h.xMax - h.xMin) / h.pw;
    window._vwView.offsetMs = touchStartOffset - dx * msPerPx;
    scheduleRedraw();
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { touching = false; }, { passive: true });
  
  // Zoom (wheel) - mění spanH
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.2 : 1/1.2;
    let newSpan = window._vwView.spanH * factor;
    newSpan = Math.max(2, Math.min(168, newSpan));  // 2h až 7 dní
    window._vwView.spanH = newSpan;
    drawVdtWind(document.getElementById('vwCanvas'));
  }, { passive: false });
  
  canvas.style.cursor = 'grab';
}

// Spustit setup po prvním načtení
setTimeout(() => setupVwInteraction(), 100);

// === INIT ===
// VDT KPI v záhlaví - ne v této stránce, takže preserve volání ale fail safely
function setDot() {} // no-op pro kompatibilitu

// VW toggle persistence + re-render
(function initVwToggles() {
  const ids = ['vw-tg-vdt', 'vw-tg-rlact', 'vw-tg-rlfc', 'vw-tg-rldelta'];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (!el) continue;
    const saved = localStorage.getItem('vw_' + id);
    if (saved === '0') el.checked = false;
    else if (saved === '1') el.checked = true;
    el.addEventListener('change', () => {
      localStorage.setItem('vw_' + id, el.checked ? '1' : '0');
      drawVdtWind(document.getElementById('vwCanvas'));
    });
  }
})();

// Resize handler
window.addEventListener('resize', () => {
  if (window._vwData) drawVdtWind(document.getElementById('vwCanvas'));
});

// Auto-init při startu
window.addEventListener('load', () => {
  if (!API_URL) {
    document.getElementById('setupModal').style.display = 'flex';
  } else {
    document.getElementById('setupModal').style.display = 'none';
    loadVdtWind();
    // Auto-refresh každých 5 minut
    setInterval(() => loadVdtWind(), 5 * 60 * 1000);
  }
});
