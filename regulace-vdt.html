<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ČEPS · Regulace + VDT</title>
<style>
body, * { font-variant-numeric: lining-nums tabular-nums; font-feature-settings: "zero" 0, "ss01" 0; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f6; font-family: 'Inter', sans-serif; font-size: 12px; color: #1a1a2e; }
header { background: #fff; border-bottom: 1px solid #e0e4ef; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; min-height: 42px; gap: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.logo { font-size: 13px; font-weight: 700; letter-spacing: .04em; white-space: nowrap; }
.logo em { color: #1565c0; font-style: normal; }
.hdr-right { display: flex; align-items: center; gap: 6px; }
.hbtn { background: #f4f5f9; border: 1px solid #dde; color: #666; font-family: 'Inter', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; transition: all .15s; text-decoration:none; }
.hbtn:hover { border-color: #1565c0; color: #1565c0; }
.badge { display: flex; align-items: center; gap: 5px; font-size: 11px; background: #eaf5ea; border: 1px solid #b8ddb8; border-radius: 20px; padding: 2px 9px; color: #2e7d32; white-space: nowrap; }
.badge.err { background: #ffeaea; border-color: #ffb3b3; color: #c0392b; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #43a047; }
.dot.anim { animation: blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
.dot.err { background: #e53935; animation: none; }
.dot.idle { background: #bbb; animation: none; }
.cd { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #1565c0; min-width: 30px; }
main { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; max-width: 1400px; margin: 0 auto; width: 100%; }
.chart-panel { background: #fff; border: 1px solid #e0e4ef; border-radius: 8px; overflow: hidden; }
.panel-hdr { background: #fff; border-bottom: 1px solid #eef0f8; padding: 7px 12px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.panel-title { font-size: 12px; font-weight: 600; color: #1a1a2e; }
.panel-sub { font-size: 10px; color: #666; }
.panel-legend { background: #f4f5f9; border-top: 1px solid #eef0f8; padding: 5px 12px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
.pleg { font-size: 10px; color: #555; display: flex; align-items: center; gap: 5px; }
.pleg-sq { width: 18px; height: 10px; border-radius: 1px; flex-shrink: 0; }
.pleg-ln { width: 18px; height: 0; border-top: 2px solid; flex-shrink: 0; }
.err-bar { background: #fff0f0; border: 1px solid #ffb3b3; border-radius: 6px; padding: 8px 12px; color: #c0392b; font-size: 11px; display: none; }
canvas { max-width: 100%; display: block; }
.status { font-family:'JetBrains Mono',monospace; font-size:10px; color:#666; }
</style>
</head>
<body>

<header>
  <div class="logo">ČEPS <em>Regulace + VDT</em></div>
  <div class="hdr-right">
    <div class="badge" id="badge"><span class="dot idle" id="dot"></span><span id="stxt">—</span></div>
    <span class="cd" id="cd">—</span>
    <button class="hbtn" onclick="loadAll()">↺</button>
    <a class="hbtn" href="/hory.html">← dashboard</a>
  </div>
</header>

<main>
  <div class="err-bar" id="err"></div>

  <div class="chart-panel">
    <div class="panel-hdr">
      <div>
        <div class="panel-title">Aktuální regulace + VDT bid/ask</div>
        <div class="panel-sub">minutová data · černá = odchylka · plochy = mFRR/aFRR aktivace · VDT bid/ask (pravá osa €)</div>
      </div>
      <div class="status" id="chartStatus">—</div>
    </div>
    <div style="background:#dce8f5; position:relative; overflow:hidden; width:100%;" id="topWrap">
      <canvas id="topCanvas" height="320" style="width:100%;height:320px;display:block;"></canvas>
      <div id="topTip" style="position:absolute;display:none;pointer-events:none;background:#1a1a2e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 8px;border-radius:4px;white-space:nowrap;top:6px;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.2);line-height:1.5;"></div>
      <div id="topLine" style="position:absolute;display:none;pointer-events:none;width:1px;background:rgba(26,26,46,0.3);top:0;bottom:0;z-index:9;"></div>
    </div>
    <div class="panel-legend">
      <span class="pleg"><span class="pleg-ln" style="border-color:#111"></span>odchylka (MW)</span>
      <span class="pleg"><span class="pleg-sq" style="background:#4caf50;opacity:.8"></span>mFRR&minus;</span>
      <span class="pleg"><span class="pleg-sq" style="background:#f44336;opacity:.8"></span>mFRR+</span>
      <span class="pleg"><span class="pleg-sq" style="background:#00b4d8;opacity:.8"></span>aFRR&minus;</span>
      <span class="pleg"><span class="pleg-sq" style="background:#ff9800;opacity:.8"></span>aFRR+</span>
      <span class="pleg"><span class="pleg-ln" style="border-color:#0b8a3e"></span>VDT bid (prodej)</span>
      <span class="pleg"><span class="pleg-ln" style="border-color:#c0392b"></span>VDT ask (nákup)</span>
    </div>
  </div>
</main>

<script>
let API_URL = '';
let refreshTimer = null, countdownTimer = null, rem = 15, REFRESH_S = 15;
let _topMeta = null;
let _vdtBands = {};
let _lastObCount = 0;

(function init(){
  const origin = window.location.origin;
  const urlApi = new URLSearchParams(location.search).get('api');
  API_URL = (urlApi || origin || '').replace(/\/$/, '');
  if (API_URL.startsWith('file')) API_URL = 'http://localhost:8765';
})();

function ft(ds) {
  if (!ds) return '';
  try {
    return new Intl.DateTimeFormat('cs-CZ', {
      timeZone:'Europe/Prague', hour:'2-digit', minute:'2-digit', hour12:false
    }).format(new Date(ds));
  } catch(e) { return ''; }
}
function setDot(state, txt) {
  document.getElementById('dot').className = 'dot '+(state==='ok'?'anim':state==='err'?'err':'idle');
  if (txt) document.getElementById('stxt').textContent = txt;
  document.getElementById('badge').className = 'badge'+(state==='err'?' err':'');
}
function showErr(msg){ const e=document.getElementById('err'); if(!msg){e.style.display='none';return;} e.style.display='block'; e.textContent=msg; }

async function apiFetch(method, extra={}) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const t4 = new Date(now.getTime() - 4*60*60*1000);
  const df = `${t4.getFullYear()}-${pad(t4.getMonth()+1)}-${pad(t4.getDate())}T${pad(t4.getHours())}:${pad(t4.getMinutes())}:00`;
  const dt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const p = new URLSearchParams({ method, dateFrom:df, dateTo:dt, agregation:'MI', function:'AVG', ...extra });
  const r = await fetch(`${API_URL}/api?${p}`);
  if (!r.ok) { const j = await r.json().catch(()=>({error:r.status})); throw new Error(j.error||r.status); }
  return r.json();
}

function agg15(rows, col) {
  const b = {};
  rows.forEach(r => {
    const d = new Date(r.date);
    const m15 = Math.floor(d.getMinutes()/15)*15;
    const key = `${String(d.getHours()).padStart(2,'0')}:${String(m15).padStart(2,'0')}`;
    if (!b[key]) b[key] = [];
    b[key].push(parseFloat(r[col])||0);
  });
  return Object.entries(b).map(([lbl, vals]) => ({ lbl, v: vals.reduce((a,x)=>a+x,0)/vals.length }));
}

function setupCanvas(canvas, h) {
  const dpr = window.devicePixelRatio || 1;
  if (!canvas.dataset.fixedH) canvas.dataset.fixedH = h;
  const H = parseInt(canvas.dataset.fixedH);
  const W = canvas.parentElement.clientWidth;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W, H };
}

function dayKeyPrague(){
  const now=new Date();
  const off=(now.getUTCMonth()>=3 && now.getUTCMonth()<=9)?2:1;
  const prg=new Date(now.getTime()+off*3600*1000);
  return prg.getUTCFullYear().toString()+String(prg.getUTCMonth()+1).padStart(2,'0')+String(prg.getUTCDate()).padStart(2,'0');
}
function dayKeyPragueOffset(days){
  const now=new Date();
  const off=(now.getUTCMonth()>=3 && now.getUTCMonth()<=9)?2:1;
  const prg=new Date(now.getTime()+off*3600*1000 + days*24*3600*1000);
  return prg.getUTCFullYear().toString()+String(prg.getUTCMonth()+1).padStart(2,'0')+String(prg.getUTCDate()).padStart(2,'0');
}

function drawTopChart(canvas, odchRows, colO, svrRows, colAp, colAm, colMp, colMm) {
  const { ctx, W, H } = setupCanvas(canvas, parseInt(canvas.getAttribute('height'))||320);
  const PAD = { top: 16, right: 56, bottom: 28, left: 44 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;
  const n  = odchRows.length;
  if (!n) return;

  _topMeta = { rows: odchRows, PAD, cW, n };

  const getAllVals = col => col ? odchRows.map((_,i) => parseFloat((svrRows[i]||{})[col])||0) : [];
  const odchVals = odchRows.map(r => { const s=r[colO]; return (s===''||s==null)?NaN:(parseFloat(s)||0); });
  const apVals   = getAllVals(colAp);
  const amVals   = getAllVals(colAm);
  const mpVals   = getAllVals(colMp);
  const mmVals   = getAllVals(colMm);
  const allV = [...odchVals,...apVals,...amVals,...mpVals,...mmVals].filter(Number.isFinite);
  const dMax = Math.max(0,...allV); const dMin = Math.min(0,...allV);
  // poslední index s reálnou odchylkou (budoucnost je NaN)
  let nReal = 0; for (let i=0;i<odchVals.length;i++){ if (Number.isFinite(odchVals[i])) nReal=i+1; }
  const pad  = (dMax-dMin)*0.12||30;
  const yMax = dMax+pad; const yMin = dMin-pad; const yR = yMax-yMin;

  function xP(i) { return PAD.left + (i/(n-1||1))*cW; }
  function yP(v) { return PAD.top + cH*((v-yMin)/yR); }
  const y0 = yP(0);

  const vdtBid = odchRows.map(r => vdtAt(r.date, 'bid'));
  const vdtAsk = odchRows.map(r => vdtAt(r.date, 'ask'));
  const priceV = [...vdtBid, ...vdtAsk].filter(Number.isFinite);
  let pMin, pMax, pR;
  if (priceV.length) {
    pMin = Math.min(...priceV); pMax = Math.max(...priceV);
    const pp = (pMax-pMin)*0.15 || 5; pMin -= pp; pMax += pp; pR = pMax-pMin;
  }
  function yE(v){ return PAD.top + cH*(1-(v-pMin)/pR); }

  ctx.fillStyle = '#dce8f5';
  ctx.fillRect(PAD.left, PAD.top, cW, cH);

  // budoucí část (od splitIdx) - světlejší overlay + dělící čára "teď"
  const splitIdx = (_lastOdch && _lastOdch.splitIdx) || 0;
  if (splitIdx > 0 && splitIdx < n) {
    const xS = xP(splitIdx);
    ctx.fillStyle = '#eef3fa';
    ctx.fillRect(xS, PAD.top, PAD.left + cW - xS, cH);
    ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(xS, PAD.top); ctx.lineTo(xS, PAD.top+cH); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#c8851a'; ctx.font = 'bold 10px JetBrains Mono, monospace'; ctx.textAlign = 'left';
    ctx.fillText('teď →', xS + 5, PAD.top + 12);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const y = PAD.top + (cH/8)*i;
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y); ctx.stroke();
  }

  odchRows.forEach((r, i) => {
    const d = new Date(r.date);
    const mins = d.getMinutes();
    if (mins % 15 !== 0) return;
    const isHour = mins === 0;
    const x = xP(i);
    ctx.strokeStyle = isHour ? 'rgba(80,120,180,0.45)' : 'rgba(120,160,210,0.18)';
    ctx.lineWidth   = isHour ? 1.5 : 0.8;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + cH); ctx.stroke();
    if (isHour) {
      ctx.fillStyle = '#7090b0'; ctx.font = '10px JetBrains Mono, monospace'; ctx.textAlign = 'center';
      ctx.fillText(ft(r.date), x, PAD.top + cH + 16);
    }
  });

  ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(PAD.left,y0); ctx.lineTo(PAD.left+cW,y0); ctx.stroke();

  const tgt15 = agg15(odchRows.slice(0,nReal), colO);
  ctx.strokeStyle = '#e53935'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  let prevX = null;
  tgt15.forEach((b, bi) => {
    const startIdx = Math.floor(bi * nReal / tgt15.length);
    const endIdx   = Math.floor((bi+1) * nReal / tgt15.length);
    const x1 = xP(startIdx); const x2 = xP(Math.min(endIdx, nReal-1));
    const y  = yP(b.v);
    if (prevX === null) ctx.moveTo(x1, y); else ctx.lineTo(x1, y);
    ctx.lineTo(x2, y); prevX = x2;
  });
  ctx.stroke();

  // poslední index s reálnou odchylkou (budoucnost je NaN)

  const fillPath = () => {
    ctx.beginPath();
    ctx.moveTo(xP(0), y0);
    for (let i=0;i<nReal;i++){ if(Number.isFinite(odchVals[i])) ctx.lineTo(xP(i), yP(odchVals[i])); }
    ctx.lineTo(xP(Math.max(0,nReal-1)), y0);
    ctx.closePath();
  };
  ctx.save(); ctx.beginPath(); ctx.rect(PAD.left, PAD.top, cW, y0 - PAD.top); ctx.clip();
  fillPath(); ctx.fillStyle = 'rgba(210,20,20,0.22)'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.beginPath(); ctx.rect(PAD.left, y0, cW, PAD.top + cH - y0); ctx.clip();
  fillPath(); ctx.fillStyle = 'rgba(120,120,140,0.12)'; ctx.fill(); ctx.restore();

  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5;
  ctx.beginPath(); let oStarted=false;
  odchVals.forEach((v, i) => { if(!Number.isFinite(v)){oStarted=false;return;} const x=xP(i),y=yP(v); oStarted?ctx.lineTo(x,y):(ctx.moveTo(x,y),oStarted=true); });
  ctx.stroke();

  // svislice "teď" = hranice minulost/budoucnost
  if (nReal>0 && nReal<n){
    const xnow = xP(nReal-1);
    ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(xnow,PAD.top); ctx.lineTo(xnow,PAD.top+cH); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#c77700'; ctx.font = 'bold 10px JetBrains Mono'; ctx.textAlign='left';
    ctx.fillText('teď →', xnow+4, PAD.top+12);
  }

  if (colMm) {
    ctx.fillStyle = 'rgba(76,175,80,0.55)'; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 0.8;
    mmVals.forEach((v, i) => { if (!v) return; const x = xP(i); const bw = cW/(n-1||1);
      const yTop = v > 0 ? y0 : yP(-v); const yBot = v > 0 ? yP(-v) : y0;
      ctx.fillRect(x-bw/2, yTop, bw, yBot-yTop); ctx.strokeRect(x-bw/2, yTop, bw, yBot-yTop); });
  }
  if (colMp) {
    ctx.fillStyle = 'rgba(200,30,30,0.85)';
    mpVals.forEach((v, i) => { if (!v) return; const x = xP(i); const bw = cW/(n-1||1);
      const yTop = yP(-Math.abs(v)); const yBot = y0; ctx.fillRect(x-bw/2, yTop, bw, yBot-yTop); });
  }
  if (colAm) {
    ctx.fillStyle = 'rgba(0,180,216,0.7)';
    amVals.forEach((v, i) => { if (!v) return; const x = xP(i); const bw = cW/(n-1||1);
      const yTop = y0; const yBot = yP(Math.abs(v)); ctx.fillRect(x-bw/2, yTop, bw, yBot-yTop); });
  }
  if (colAp) {
    ctx.fillStyle = 'rgba(255,152,0,0.65)'; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 0.8;
    apVals.forEach((v, i) => { if (!v) return; const x = xP(i); const bw = cW/(n-1||1);
      const yTop = yP(-Math.abs(v)); const yBot = y0; ctx.fillRect(x-bw/2, yTop, bw, yBot-yTop); ctx.strokeRect(x-bw/2, yTop, bw, yBot-yTop); });
  }

  if (priceV.length) {
    const stepLine = (arr, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
      ctx.beginPath(); let started=false;
      for (let i=0;i<n;i++){
        const v = arr[i]; if (!Number.isFinite(v)) { started=false; continue; }
        const x = xP(i), y = yE(v);
        if (!started) { ctx.moveTo(x,y); started=true; } else { ctx.lineTo(x,y); }
      }
      ctx.stroke();
    };
    stepLine(vdtBid, '#0b8a3e');
    stepLine(vdtAsk, '#c0392b');
  }

  ctx.fillStyle = '#6688aa'; ctx.font = '10px JetBrains Mono, monospace'; ctx.textAlign = 'right';
  const yTicks = [-250,-200,-150,-100,-50,0,50,100,150,200,250].filter(v => v>=yMin && v<=yMax);
  yTicks.forEach(v => { ctx.fillText(-v, PAD.left-5, yP(v)+3); });
  if (priceV.length) {
    ctx.fillStyle = '#0b8a3e'; ctx.textAlign = 'left';
    for (let i=0;i<=4;i++){ const v = pMin + pR*(i/4); ctx.fillText(v.toFixed(0), PAD.left+cW+5, yE(v)+3); }
    ctx.font = 'bold 9px JetBrains Mono'; ctx.fillText('€/MWh', PAD.left+cW+30, PAD.top-4);
  }
  ctx.fillStyle = '#6688aa'; ctx.font = 'bold 9px JetBrains Mono'; ctx.textAlign='left';
  ctx.fillText('MW', PAD.left-2, PAD.top-4);
}

// převede ISO čas na pražské "HH:MM" (15min slot) klíče
function pragueHM(isoDate){
  const d = new Date(isoDate);
  const parts = new Intl.DateTimeFormat('cs-CZ', {
    timeZone:'Europe/Prague', hour:'2-digit', minute:'2-digit', hour12:false
  }).formatToParts(d);
  const hh = parts.find(p=>p.type==='hour').value.padStart(2,'0');
  const mm = parseInt(parts.find(p=>p.type==='minute').value);
  return { hh, m15: Math.floor(mm/15)*15 };
}
function vdtAt(isoDate, side){
  const { hh, m15 } = pragueHM(isoDate);
  const qhKey = hh+':'+String(m15).padStart(2,'0');
  const b = _vdtBands[qhKey] || _vdtBands[hh+':00'];
  if (!b) return null;
  const v = b[side];
  return Number.isFinite(v) ? v : null;
}

async function loadVdt() {
  try {
    const dayY = dayKeyPrague();
    const tomY = dayKeyPragueOffset(1);
    const dOB = await fetch(`${API_URL}/vdt/orderbook`, {cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null);
    if (!dOB || !dOB.rows) { return; }
    if (_lastObCount && dOB.rows.length>0 && dOB.rows.length < _lastObCount*0.6) return;
    if (dOB.rows.length>0) _lastObCount = Math.max(_lastObCount, dOB.rows.length);

    const bands = {};
    const setBand = (key,bid,ask) => { bands[key] = {
      bid: Number.isFinite(bid)?bid:null, ask: Number.isFinite(ask)?ask:null }; };
    const hourRows=[], qhRows=[];
    dOB.rows.forEach(row=>{ const k=row.kontrakt||{}; if(k.date!==dayY && k.date!==tomY) return; (k.type==='H'?hourRows:qhRows).push(row); });
    hourRows.forEach(row=>{ const m=((row.kontrakt||{}).from||'').match(/^(\d{1,2}):(\d{2})$/); if(!m) return;
      const hh=parseInt(m[1]); for(let q=0;q<4;q++) setBand(String(hh).padStart(2,'0')+':'+String(q*15).padStart(2,'0'), row.bid, row.ask);
      setBand(String(hh).padStart(2,'0')+':00', row.bid, row.ask); });
    qhRows.forEach(row=>{ const m=((row.kontrakt||{}).from||'').match(/^(\d{1,2}):(\d{2})$/); if(!m) return;
      setBand(String(parseInt(m[1])).padStart(2,'0')+':'+m[2], row.bid, row.ask); });

    _vdtBands = bands;
    window._obStamp = dOB.latest_ts || null;
  } catch(e){ console.warn('loadVdt:', e); }
}

let _lastOdch = null;
async function loadReg() {
  const [dO, dS] = await Promise.all([
    apiFetch('AktualniSystemovaOdchylkaCR'),
    apiFetch('AktivaceSVRvCR', { para1:'all' })
  ]);
  if (!dO.rows.length) { setDot('err','bez dat'); return; }

  const colO = dO.columns[0];
  const gc   = kw => dS.columns.find(c => c.includes(kw)) || null;
  const colAp=gc('aFRR+'), colAm=gc('aFRR-'), colMp=gc('mFRR+'), colMm=gc('mFRR-');
  const svrSync = dO.rows.map((r, i) => dS.rows[i] || {});

  // protáhni osu doprava do budoucna: prázdné minutové sloty od posledního času
  // +3h dopředu. Odchylka/aktivace tam budou prázdné (NaN), ale VDT bid/ask se vykreslí.
  const rows = dO.rows.slice();
  const svr  = svrSync.slice();
  const lastT = new Date(rows[rows.length-1].date);
  const stepMs = rows.length>1 ? (new Date(rows[1].date)-new Date(rows[0].date)) : 60000;
  const FUTURE_MS = 3*60*60*1000;   // +3 hodiny dopředu
  const endT = new Date(lastT.getTime() + FUTURE_MS);
  for (let t=lastT.getTime()+stepMs; t<=endT.getTime(); t+=stepMs){
    const iso = new Date(t).toISOString();
    const empty = { date: iso }; empty[colO] = '';   // prázdná odchylka -> NaN
    rows.push(empty);
    svr.push({});                                    // prázdné aktivace
  }

  _lastOdch = { rows, svr, colO, colAp, colAm, colMp, colMm, fetched: dO.fetched_at, splitIdx: dO.rows.length };
  setDot('ok','živě');
  redraw();
}

function redraw(){
  if (!_lastOdch) return;
  const t = _lastOdch;
  drawTopChart(document.getElementById('topCanvas'), t.rows, t.colO, t.svr, t.colAp, t.colAm, t.colMp, t.colMm);
  const last = t.rows[t.rows.length-1];
  const nBid = Object.values(_vdtBands).filter(b=>Number.isFinite(b.bid)).length;
  const nAsk = Object.values(_vdtBands).filter(b=>Number.isFinite(b.ask)).length;
  document.getElementById('chartStatus').textContent =
    `data z ${ft(last.date)} · VDT bid ${nBid} · ask ${nAsk}` + (window._obStamp?` · OB ${window._obStamp}`:'');
}

async function loadAll(){
  rem = REFRESH_S;
  showErr(null);
  try {
    await Promise.all([ loadReg(), loadVdt() ]);
    redraw();
  } catch(e){ console.error(e); setDot('err','chyba'); showErr('Chyba: '+e.message); }
}

(function(){
  const canvas = document.getElementById('topCanvas');
  const tip    = document.getElementById('topTip');
  const line   = document.getElementById('topLine');
  canvas.addEventListener('mousemove', e => {
    if (!_topMeta) return;
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const { rows, PAD, cW, n } = _topMeta;
    if (mx < PAD.left || mx > PAD.left + cW) { tip.style.display='none'; line.style.display='none'; return; }
    const idx = Math.max(0, Math.min(n-1, Math.round((mx - PAD.left) / cW * (n-1))));
    const r = rows[idx]; if (!r) return;
    const t = _lastOdch;
    const od = t ? -(parseFloat(r[t.colO])||0) : null;
    const bid = vdtAt(r.date,'bid'), ask = vdtAt(r.date,'ask');
    let html = `<b>${ft(r.date)}</b>`;
    if (od!=null) html += `<br>odch: ${od>0?'+':''}${od.toFixed(1)} MW`;
    if (Number.isFinite(ask)) html += `<br>ask (nákup): <span style="color:#ff7b6e">${ask.toFixed(1)}</span> €`;
    if (Number.isFinite(bid)) html += `<br>bid (prodej): <span style="color:#7fd99f">${bid.toFixed(1)}</span> €`;
    tip.innerHTML = html;
    tip.style.display = 'block';
    tip.style.left = Math.min(mx + 10, rect.width - 90) + 'px';
    line.style.display = 'block';
    line.style.left = mx + 'px';
  });
  canvas.addEventListener('mouseleave', () => { tip.style.display='none'; line.style.display='none'; });
})();

window.addEventListener('resize', redraw);

loadAll();
countdownTimer = setInterval(()=>{ rem=Math.max(0,rem-1); document.getElementById('cd').textContent=rem+'s'; if(rem<=0)rem=REFRESH_S; }, 1000);
refreshTimer   = setInterval(loadAll, REFRESH_S*1000);
setInterval(()=>{ loadVdt().then(redraw); }, 5000);
</script>
