<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDT Live — OTE</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1a1a; --muted:#8a8a8a;
    --line:#e4e4e4; --hour-bg:#f4f4f4;
    --bid:#0b8a3e; --bid-bg:#eafaf0;
    --ask:#c0392b; --ask-bg:#fdeeec;
    --stale:#bbb; --live:#0b8a3e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'SF Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace;
    font-size:13px; padding:14px;
  }
  header{
    display:flex; align-items:center; gap:14px;
    margin-bottom:12px; flex-wrap:wrap;
  }
  h1{font-size:15px; font-weight:700; letter-spacing:.5px}
  .status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--stale)}
  .dot.live{background:var(--live); box-shadow:0 0 0 0 rgba(11,138,62,.5); animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(11,138,62,.5)}70%{box-shadow:0 0 0 6px rgba(11,138,62,0)}100%{box-shadow:0 0 0 0 rgba(11,138,62,0)}}
  .meta{font-size:11px; color:var(--muted)}
  table{border-collapse:collapse; width:100%; max-width:760px}
  th{
    text-align:right; font-size:10px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:.6px;
    padding:6px 10px; border-bottom:2px solid var(--line);
  }
  th.l{text-align:left}
  td{padding:4px 10px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap}
  td.l{text-align:left}
  tr.hour{background:var(--hour-bg); font-weight:700}
  tr.hour td{border-bottom:1px solid #d8d8d8}
  tr.qh td.l{padding-left:26px; color:#555; font-weight:400}
  .bid{color:var(--bid)}
  .ask{color:var(--ask)}
  .bidcell{background:var(--bid-bg)}
  .askcell{background:var(--ask-bg)}
  .dim{color:var(--muted)}
  .flash{animation:f .6s ease}
  @keyframes f{0%{background:#fff8c5}100%{}}
  .err{color:var(--ask); font-size:12px; margin-top:8px; max-width:760px}
  .qtys{font-size:10px; color:var(--muted)}
</style>
</head>
<body>
  <header>
    <h1>VDT LIVE</h1>
    <div class="status"><span id="dot" class="dot"></span><span id="state">připojuji…</span></div>
    <div class="meta" id="meta"></div>
  </header>

  <table id="tbl">
    <thead>
      <tr>
        <th class="l">Kontrakt</th>
        <th>Bid Qty</th>
        <th>Bid</th>
        <th>Ask</th>
        <th>Ask Qty</th>
        <th>Last</th>
        <th>Spread</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td class="l dim" colspan="7">čekám na data z bota…</td></tr>
    </tbody>
  </table>
  <div class="err" id="err"></div>

<script>
const ENDPOINT = "http://localhost:8745/vdt";
const REFRESH  = 1000; // ms
let prev = {};         // pro flash pri zmene

const fmt = (v) => (v===null||v===undefined) ? '–' : (typeof v==='number'? v.toFixed(2) : v);
const fmtq = (v) => (v===null||v===undefined||v===0) ? '' : v;

// Z routing-key / contract kodu urcime hodinu a jestli je to QH.
// OTE kontrakty maji ruzne tvary; tridime podle parsovatelne hodiny dodavky.
function classify(name){
  // hledame vzor s casem dodavky napr. "...12-13..." (hodina) nebo "...12:00-12:15..." / "Q.." (QH)
  let isQH = /(:\d{2})|Q\d|Quarter|_15|QH/i.test(name);
  // pokus o vytazeni pocatecni hodiny pro grupovani
  let h = null;
  let m = name.match(/(\d{1,2}):(\d{2})/);          // 12:00
  if(m){ h = parseInt(m[1],10); }
  if(h===null){ m = name.match(/\b(\d{1,2})-(\d{1,2})\b/); if(m){ h = parseInt(m[1],10);} } // 12-13
  if(h===null){ m = name.match(/_(\d{1,2})_/); if(m){ h = parseInt(m[1],10);} }
  return {isQH, hour:h};
}

function render(data){
  const c = data.contracts || {};
  const names = Object.keys(c);
  if(names.length===0){
    document.getElementById('rows').innerHTML =
      '<tr><td class="l dim" colspan="7">žádné kontrakty (trh možná zavřený)</td></tr>';
    return;
  }

  // seskup podle hodiny; hodinovy radek + jeho QH pod nim
  const groups = {}; // hour -> {hourRow, qhRows:[]}
  const noHour = [];
  for(const name of names){
    const info = classify(name);
    const row = {name, info, ...c[name]};
    if(info.hour===null){ noHour.push(row); continue; }
    groups[info.hour] = groups[info.hour] || {hour:info.hour, hourRow:null, qh:[]};
    if(info.isQH) groups[info.hour].qh.push(row);
    else groups[info.hour].hourRow = row;
  }

  const hours = Object.keys(groups).map(Number).sort((a,b)=>a-b);
  let html = '';

  const cell = (row, cls='') => {
    const sp = row.spread;
    return `
      <td class="qtys">${fmtq(row.qty_bid)}</td>
      <td class="bidcell"><span class="bid">${fmt(row.bid)}</span></td>
      <td class="askcell"><span class="ask">${fmt(row.ask)}</span></td>
      <td class="qtys">${fmtq(row.qty_ask)}</td>
      <td>${fmt(row.last)}</td>
      <td class="${sp!==null&&sp!==undefined?'':'dim'}">${fmt(sp)}</td>`;
  };

  const flashCls = (name, row) => {
    const p = prev[name];
    let f = '';
    if(p && (p.bid!==row.bid || p.ask!==row.ask || p.last!==row.last)) f=' flash';
    prev[name] = {bid:row.bid, ask:row.ask, last:row.last};
    return f;
  };

  for(const h of hours){
    const g = groups[h];
    const label = String(h).padStart(2,'0')+':00–'+String((h+1)%24).padStart(2,'0')+':00';
    if(g.hourRow){
      html += `<tr class="hour${flashCls(g.hourRow.name,g.hourRow)}"><td class="l">${label}</td>${cell(g.hourRow)}</tr>`;
    } else {
      html += `<tr class="hour"><td class="l">${label}</td><td colspan="6" class="dim">—</td></tr>`;
    }
    // QH serazene podle nazvu
    g.qh.sort((a,b)=>a.name.localeCompare(b.name));
    for(const q of g.qh){
      const qlabel = (q.name.match(/(\d{1,2}:\d{2})/)||[,''])[1] || q.name;
      html += `<tr class="qh${flashCls(q.name,q)}"><td class="l">${qlabel||q.name}</td>${cell(q)}</tr>`;
    }
  }
  // kontrakty bez rozpoznane hodiny dolu
  noHour.sort((a,b)=>a.name.localeCompare(b.name));
  for(const r of noHour){
    html += `<tr class="qh${flashCls(r.name,r)}"><td class="l">${r.name}</td>${cell(r)}</tr>`;
  }

  document.getElementById('rows').innerHTML = html;
}

async function tick(){
  const dot = document.getElementById('dot');
  const state = document.getElementById('state');
  const err = document.getElementById('err');
  try{
    const res = await fetch(ENDPOINT, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    render(data);
    dot.className = 'dot live';
    state.textContent = 'živě';
    err.textContent = '';
    const n = Object.keys(data.contracts||{}).length;
    document.getElementById('meta').textContent =
      n+' kontraktů · '+(data.updated? new Date(data.updated).toLocaleTimeString('cs-CZ') : '');
  }catch(e){
    dot.className = 'dot';
    state.textContent = 'odpojeno';
    err.textContent = 'Nelze se připojit k botu na '+ENDPOINT+
      ' — běží ote_bot.py? ('+e.message+')';
  }
}
tick();
setInterval(tick, REFRESH);
</script>
</body>
</html>
