<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDT Live — OTE</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1a1a; --muted:#8a8a8a;
    --line:#e4e4e4; --hour-bg:#f4f4f4;
    --bid:#0b8a3e; --bid-bg:#eafaf0;
    --ask:#c0392b; --ask-bg:#fdeeec;
    --stale:#bbb; --live:#0b8a3e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'SF Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace;
    font-size:13px; padding:14px;
  }
  header{
    display:flex; align-items:center; gap:14px;
    margin-bottom:12px; flex-wrap:wrap;
  }
  h1{font-size:15px; font-weight:700; letter-spacing:.5px}
  .status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--stale)}
  .dot.live{background:var(--live); box-shadow:0 0 0 0 rgba(11,138,62,.5); animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(11,138,62,.5)}70%{box-shadow:0 0 0 6px rgba(11,138,62,0)}100%{box-shadow:0 0 0 0 rgba(11,138,62,0)}}
  .meta{font-size:11px; color:var(--muted)}
  table{border-collapse:collapse; width:100%; max-width:1000px}
  th{
    text-align:right; font-size:10px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:.6px;
    padding:6px 10px; border-bottom:2px solid var(--line);
  }
  th.l{text-align:left}
  td{padding:4px 10px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap}
  td.l{text-align:left}
  tr.hour{background:var(--hour-bg); font-weight:700}
  tr.hour td{border-bottom:1px solid #d8d8d8}
  tr.qh td.l{padding-left:26px; color:#555; font-weight:400}
  .bid{color:var(--bid)}
  .ask{color:var(--ask)}
  .bidcell{background:var(--bid-bg)}
  .askcell{background:var(--ask-bg)}
  .dim{color:var(--muted)}
  .flash{animation:f .6s ease}
  @keyframes f{0%{background:#fff8c5}100%{}}
  .err{color:var(--ask); font-size:12px; margin-top:8px; max-width:900px}
  .qtys{font-size:10px; color:var(--muted)}
  /* oddeleni panelu VDT | DT */
  .sep{border-left:3px solid #c9c9c9 !important}
  th.dthead{color:#2a4d8f}
  td.dtcell{background:#f3f6fc}
  tr.hour td.dtcell{background:#e7eefb}
  .diff-pos{color:#0b8a3e}
  .diff-neg{color:#c0392b}
  .panel-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
  .daytitle{font-size:14px;font-weight:700;margin:18px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--ink)}
  .daytitle:first-child{margin-top:4px}
  .loading{padding:20px;font-size:13px}
  table{margin-bottom:8px}
</style>
</head>
<body>
  <header>
    <h1>VDT LIVE</h1>
    <div class="status"><span id="dot" class="dot"></span><span id="state">připojuji…</span></div>
    <div class="meta" id="meta"></div>
  </header>

  <div id="container">
    <div class="loading dim">čekám na data z bota…</div>
  </div>
  <div class="err" id="err"></div>

<script>
const BASE = (location.origin.startsWith("http") && location.origin !== "null")
  ? location.origin : "https://ceps-live2.onrender.com";
const ENDPOINT = BASE + "/vdt/orderbook";
const REFRESH  = 1500;
let prev = {};
const pad = n => String(n).padStart(2,'0');

// DT ceny per den: dt[YYYYMMDD] = { hour:{h:eur}, qh:{"HH:MM":eur} }
let dt = {};

const fmt = (v) => (v===null||v===undefined) ? '\u2013' : (typeof v==='number'? v.toFixed(2) : v);

function ymd(dateObj){
  return dateObj.getFullYear().toString()+pad(dateObj.getMonth()+1)+pad(dateObj.getDate());
}
function isoFromYmd(y){ return y.slice(0,4)+'-'+y.slice(4,6)+'-'+y.slice(6,8); }
function czFromYmd(y){ return y.slice(6,8)+'.'+y.slice(4,6)+'.'+y.slice(0,4); }

// prazsky cas dnes/zitra
function dayKeys(){
  const now = new Date();
  const off = (now.getUTCMonth()>=3 && now.getUTCMonth()<=9) ? 2 : 1;
  const prg = new Date(now.getTime() + off*3600*1000);
  const today = prg.getUTCFullYear().toString()+pad(prg.getUTCMonth()+1)+pad(prg.getUTCDate());
  const t2 = new Date(prg.getTime()+24*3600*1000);
  const tom = t2.getUTCFullYear().toString()+pad(t2.getUTCMonth()+1)+pad(t2.getUTCDate());
  return {today, tom};
}

// nacti DT spot ceny pro dnes i zitra
async function loadDT(){
  const {today, tom} = dayKeys();
  const out = { [today]:{hour:{},qh:{}}, [tom]:{hour:{},qh:{}} };
  // hodinove z /ote/spot (hours_today + hours_tomorrow)
  try{
    const r = await fetch(BASE+"/ote/spot", {cache:'no-store'});
    if(r.ok){
      const d = await r.json();
      for(const p of (d.hours_today||d.hoursToday||[])){
        const v=(p.priceEur??p.priceEUR??p.price_eur); if(Number.isFinite(v)) out[today].hour[p.hour]=v;
      }
      for(const p of (d.hours_tomorrow||d.hoursTomorrow||[])){
        const v=(p.priceEur??p.priceEUR??p.price_eur); if(Number.isFinite(v)) out[tom].hour[p.hour]=v;
      }
    }
  }catch(e){ console.warn('DT hour:',e); }
  // QH z /spot/prices pro oba dny
  for(const y of [today, tom]){
    try{
      const r2 = await fetch(BASE+`/spot/prices?country=CZ&date=${isoFromYmd(y)}`, {cache:'no-store'});
      if(r2.ok){
        const d2 = await r2.json();
        if(d2.data) for(const p of d2.data){
          if(Number.isFinite(p.price_eur)) out[y].qh[`${pad(p.hour)}:${pad(p.minute)}`]=p.price_eur;
        }
      }
    }catch(e){ console.warn('DT qh:',e); }
  }
  dt = out;
}

const keyOf = (row) => (row.kontrakt && row.kontrakt.raw) || JSON.stringify(row);
function flashCls(row){
  const id=keyOf(row); const p=prev[id]; let f='';
  if(p && (p.bid!==row.bid||p.ask!==row.ask||p.last!==row.last)) f=' flash';
  prev[id]={bid:row.bid,ask:row.ask,last:row.last};
  return f;
}

function cell(row, dtPrice){
  const sp=row.spread;
  // KLADNE = vyhodne, ZAPORNE = nevyhodne (jednotne pro obe strany)
  // Long spread  = DT - ask  (kladne = kup na VDT pod DT = zisk)
  // Short spread = bid - DT  (kladne = prodej na VDT nad DT = zisk)
  let longSp  = (row.ask!=null && dtPrice!=null) ? dtPrice-row.ask : null;
  let shortSp = (row.bid!=null && dtPrice!=null) ? row.bid-dtPrice : null;
  const lCls = longSp==null?'dim':(longSp>=0?'diff-pos':'diff-neg');
  const sCls = shortSp==null?'dim':(shortSp>=0?'diff-pos':'diff-neg');
  const lStr = longSp==null?'\u2013':(longSp>=0?'+':'')+longSp.toFixed(2);
  const sStr = shortSp==null?'\u2013':(shortSp>=0?'+':'')+shortSp.toFixed(2);
  return `
    <td class="bidcell"><span class="bid">${fmt(row.bid)}</span></td>
    <td class="askcell"><span class="ask">${fmt(row.ask)}</span></td>
    <td>${fmt(row.last)}</td>
    <td class="${sp!=null?'':'dim'}">${fmt(sp)}</td>
    <td class="sep dtcell">${fmt(dtPrice)}</td>
    <td class="dtcell ${sCls}">${sStr}</td>
    <td class="dtcell ${lCls}">${lStr}</td>`;
}

// vykresli tabulku pro jeden den
function tableFor(rows, dayY){
  const dtDay = dt[dayY] || {hour:{},qh:{}};
  const groups={};
  for(const row of rows){
    const k=row.kontrakt||{};
    if(k.date!==dayY) continue;
    const frm=k.from||"99:99";
    const hh=parseInt((frm.split(":")[0]||"99"),10);
    if(isNaN(hh)||hh>23) continue;
    groups[hh]=groups[hh]||{hour:hh,hourRow:null,qh:[]};
    if(k.type==="H") groups[hh].hourRow=row; else groups[hh].qh.push(row);
  }
  const hours=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  const thead = `
    <thead>
      <tr>
        <th class="l"></th>
        <th class="panel-label" colspan="4" style="text-align:center;color:var(--bid)">VDT (live)</th>
        <th class="panel-label sep dthead" colspan="3" style="text-align:center">DT spot</th>
      </tr>
      <tr>
        <th class="l">Kontrakt</th><th>Bid</th><th>Ask</th><th>Last</th><th>Spread</th>
        <th class="sep dthead">DT</th><th class="dthead">Short spread</th><th class="dthead">Long spread</th>
      </tr>
    </thead>`;
  if(hours.length===0){
    return `<table>${thead}<tbody><tr><td class="l dim" colspan="8">žádná data</td></tr></tbody></table>`;
  }
  let body='';
  for(const h of hours){
    const g=groups[h];
    const label=pad(h)+':00\u2013'+pad((h+1)%24)+':00';
    const dtH=dtDay.hour[h]??null;
    if(g.hourRow){
      body+=`<tr class="hour${flashCls(g.hourRow)}"><td class="l">${label}</td>${cell(g.hourRow,dtH)}</tr>`;
    }else{
      const s=dtH!=null?dtH.toFixed(2):'\u2014';
      body+=`<tr class="hour"><td class="l">${label}</td><td colspan="4" class="dim">\u2014</td><td class="sep dtcell">${s}</td><td class="dtcell dim">\u2013</td><td class="dtcell dim">\u2013</td></tr>`;
    }
    g.qh.sort((a,b)=>((a.kontrakt&&a.kontrakt.from)||'').localeCompare((b.kontrakt&&b.kontrakt.from)||''));
    for(const q of g.qh){
      const frm=(q.kontrakt&&q.kontrakt.from)||'?';
      let ql=frm; const mm=frm.match(/^(\d{2}):(\d{2})$/);
      if(mm){ let hh=parseInt(mm[1],10),mi=parseInt(mm[2],10)+15; if(mi>=60){mi-=60;hh=(hh+1)%24;} ql=frm+'-'+pad(hh)+':'+pad(mi); }
      body+=`<tr class="qh${flashCls(q)}"><td class="l">${ql}</td>${cell(q, dtDay.qh[frm]??null)}</tr>`;
    }
  }
  return `<table>${thead}<tbody>${body}</tbody></table>`;
}

function render(rows){
  const {today, tom} = dayKeys();
  const c = document.getElementById('container');
  c.innerHTML =
    `<div class="daytitle">DNES \u00b7 ${czFromYmd(today)}</div>` + tableFor(rows, today) +
    `<div class="daytitle">ZÍTRA \u00b7 ${czFromYmd(tom)}</div>` + tableFor(rows, tom);
}

async function tick(){
  const dot=document.getElementById('dot');
  const state=document.getElementById('state');
  const err=document.getElementById('err');
  try{
    const res=await fetch(ENDPOINT,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rows=data.rows||[];
    // pojistka: kdyz prijde podezrele malo kontraktu (orezana odpoved pri zatizeni),
    // nepřepisuj dobry stav - pockej na dalsi plnou odpoved
    if(window._lastRowCount && rows.length>0 && rows.length < window._lastRowCount*0.6){
      dot.className='dot live'; state.textContent='živě';
      return;  // ignoruj tento neuplny snapshot
    }
    if(rows.length>0) window._lastRowCount = Math.max(window._lastRowCount||0, rows.length);
    render(rows);
    dot.className='dot live'; state.textContent='živě'; err.textContent='';
    document.getElementById('meta').textContent=
      (data.total_kontraktu||rows.length)+' kontraktů'+(data.latest_ts?(' \u00b7 '+data.latest_ts):'');
  }catch(e){
    dot.className='dot'; state.textContent='odpojeno';
    err.textContent='Nelze načíst '+ENDPOINT+' \u2014 běží ote_bot.py a posílá na /ingest? ('+e.message+')';
  }
}
loadDT();
setInterval(loadDT, 5*60*1000);

// smycka co posle dalsi request az PO dokonceni predchoziho
// (zabranuje navrseni requestu pri pomalem serveru / vice oknech)
async function loop(){
  await tick();
  setTimeout(loop, REFRESH);
}
loop();
</script>
</body>
</html>
