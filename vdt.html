<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDT Live</title>
<style>
  :root {
    --bg: #f0f0f0;
    --card: #ffffff;
    --border: #c0c0c0;
    --text: #000;
    --muted: #666;
    --buy: #1976d2;
    --sell: #c62828;
    --highlight: #fff59d;
    --row-h: #eaeaea;
    --row-qh: #fff;
    --row-hover: #e3f2fd;
    --current: #ffebee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    padding: 8px;
  }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
  }
  .header .stats {
    display: flex;
    gap: 14px;
    color: var(--muted);
    font-size: 11px;
  }
  .header .stats strong { color: var(--text); margin-left: 3px; }
  
  .status {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #aaa;
    margin-right: 6px;
    vertical-align: middle;
  }
  .status.live { background: #2e7d32; box-shadow: 0 0 4px #4caf50; }
  .status.stale { background: #f57c00; }
  .status.error { background: #c62828; }
  
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  th, td {
    padding: 3px 8px;
    text-align: right;
    border-bottom: 1px solid #e0e0e0;
    border-right: 1px solid #e0e0e0;
  }
  th {
    background: #d4d4d4;
    font-weight: 600;
    font-size: 11px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  th.kontrakt-col, td.kontrakt-col {
    text-align: left;
    font-family: 'Consolas', monospace;
  }
  
  /* Hodinové řádky - šedé pozadí */
  tr.row-h td {
    background: var(--row-h);
    font-weight: 600;
    font-size: 13px;
  }
  tr.row-h td.kontrakt-col {
    color: #000;
  }
  
  /* QH řádky - bílé, s odsazením */
  tr.row-qh td {
    background: var(--row-qh);
  }
  tr.row-qh td.kontrakt-col {
    padding-left: 24px;
    color: #555;
  }
  
  tr.current td {
    background: var(--current) !important;
  }
  tr.current.row-h td {
    background: #ffcdd2 !important;
    border-bottom: 2px solid #c62828;
  }
  
  tr:hover td {
    background: var(--row-hover) !important;
  }
  
  .price-buy { color: var(--buy); font-weight: 600; }
  .price-sell { color: var(--sell); font-weight: 600; }
  .price-empty { color: #ccc; }
  
  .updated {
    animation: flash 0.4s;
  }
  @keyframes flash {
    0% { background: #ffeb3b !important; }
    100% { background: transparent; }
  }
  
  .empty {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <h1><span class="status" id="statusDot"></span>VDT Live Orderbook</h1>
  <div class="stats">
    <span>Kontraktů: <strong id="statKontraktu">-</strong></span>
    <span>Update: <strong id="statTs">-</strong></span>
    <span>Stáří: <strong id="statAge">-</strong></span>
  </div>
</div>

<div id="tableContainer">
  <div class="empty">Načítám...</div>
</div>

<script>
const API_URL = '';
let previousData = {};

async function fetchOrderbook() {
  try {
    const r = await fetch(`${API_URL}/vdt/orderbook`, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderTable(data);
    updateStatus(data, true);
  } catch (e) {
    updateStatus(null, false, e.message);
  }
}

function updateStatus(data, ok, errMsg) {
  const dot = document.getElementById('statusDot');
  const ts = document.getElementById('statTs');
  const age = document.getElementById('statAge');
  const cnt = document.getElementById('statKontraktu');
  
  if (!ok) {
    dot.className = 'status error';
    ts.textContent = errMsg || 'chyba';
    age.textContent = '-';
    return;
  }
  
  cnt.textContent = data.total_kontraktu || 0;
  
  if (data.latest_ts) {
    const d = new Date(data.latest_ts.replace('Z', '') + 'Z');
    ts.textContent = d.toLocaleTimeString('cs-CZ');
    const ageSec = Math.floor((Date.now() - d.getTime()) / 1000);
    if (ageSec < 30) {
      dot.className = 'status live';
      age.textContent = `${ageSec}s`;
    } else if (ageSec < 300) {
      dot.className = 'status stale';
      age.textContent = `${ageSec}s`;
    } else {
      dot.className = 'status stale';
      age.textContent = `${Math.floor(ageSec/60)}m`;
    }
  } else {
    dot.className = 'status stale';
    ts.textContent = 'žádná data';
    age.textContent = '-';
  }
}

function getCurrentHour() {
  return new Date().getHours();
}

function getCurrentQH() {
  const d = new Date();
  const h = d.getHours();
  const m = d.getMinutes();
  const qhMin = Math.floor(m / 15) * 15;
  return { h, m: qhMin };
}

function renderTable(data) {
  const c = document.getElementById('tableContainer');
  const rows = data.rows || [];
  
  if (!rows.length) {
    c.innerHTML = '<div class="empty">Žádná data z ote_bridge. Je bridge spuštěný?</div>';
    return;
  }
  
  // Index hodinových a QH kontraktů podle hodiny
  const hourly = {};  // h → row
  const qhByHour = {};  // h → [row, row, row, row] sorted by from time
  
  rows.forEach(r => {
    const k = r.kontrakt;
    if (!k || !k.from) return;
    const fromH = parseInt(k.from.split(':')[0]);
    if (k.type === 'H') {
      hourly[fromH] = r;
    } else if (k.type === 'QH') {
      if (!qhByHour[fromH]) qhByHour[fromH] = [];
      qhByHour[fromH].push(r);
    }
  });
  
  // Seřaď QH v každé hodině podle from minute
  Object.keys(qhByHour).forEach(h => {
    qhByHour[h].sort((a, b) => {
      const ma = parseInt(a.kontrakt.from.split(':')[1]);
      const mb = parseInt(b.kontrakt.from.split(':')[1]);
      return ma - mb;
    });
  });
  
  // Najdi všechny hodiny které máme (H nebo QH)
  const hoursSet = new Set([...Object.keys(hourly).map(Number), ...Object.keys(qhByHour).map(Number)]);
  const hours = Array.from(hoursSet).sort((a, b) => a - b);
  
  const curHour = getCurrentHour();
  const curQH = getCurrentQH();
  
  let html = '<table><thead><tr>';
  html += '<th class="kontrakt-col" style="width:140px">Kontrakt</th>';
  html += '<th style="width:120px">Cena Nákup</th>';
  html += '<th style="width:120px">Cena Prodej</th>';
  html += '</tr></thead><tbody>';
  
  function fmtCena(v, isBuy) {
    if (v === null || v === undefined) return '<span class="price-empty">-</span>';
    const cls = isBuy ? 'price-buy' : 'price-sell';
    return `<span class="${cls}">${v.toFixed(2)}</span>`;
  }
  
  function rowHtml(r, isHourly) {
    const k = r.kontrakt;
    const cls = isHourly ? 'row-h' : 'row-qh';
    const isCurrent = isHourly 
      ? (parseInt(k.from.split(':')[0]) === curHour)
      : (parseInt(k.from.split(':')[0]) === curQH.h && parseInt(k.from.split(':')[1]) === curQH.m);
    
    const rowKey = k.raw || `${k.type}-${k.from}-${k.to}`;
    const prev = previousData[rowKey] || {};
    const changed = (prev.cena_buy !== r.cena_buy || prev.cena_sell !== r.cena_sell);
    
    const label = isHourly 
      ? `${k.from.replace(':00','')}–${k.to.replace(':00','')} h`
      : `${k.from}–${k.to}`;
    
    let h = `<tr class="${cls} ${isCurrent ? 'current' : ''} ${changed ? 'updated' : ''}">`;
    h += `<td class="kontrakt-col">${label}</td>`;
    h += `<td>${fmtCena(r.cena_buy, true)}</td>`;
    h += `<td>${fmtCena(r.cena_sell, false)}</td>`;
    h += '</tr>';
    
    previousData[rowKey] = { cena_buy: r.cena_buy, cena_sell: r.cena_sell };
    return h;
  }
  
  hours.forEach(h => {
    // Hodinový kontrakt
    if (hourly[h]) {
      html += rowHtml(hourly[h], true);
    } else {
      // Placeholder řádek bez dat
      const isCur = h === curHour;
      html += `<tr class="row-h ${isCur ? 'current' : ''}">`;
      html += `<td class="kontrakt-col">${h}–${h+1} h</td>`;
      html += `<td><span class="price-empty">-</span></td>`;
      html += `<td><span class="price-empty">-</span></td>`;
      html += `</tr>`;
    }
    
    // 4 QH pod ním
    if (qhByHour[h]) {
      qhByHour[h].forEach(r => {
        html += rowHtml(r, false);
      });
    }
  });
  
  html += '</tbody></table>';
  c.innerHTML = html;
}

// Auto refresh
let fetchInFlight = false;
async function safeFetch() {
  if (fetchInFlight) return;
  fetchInFlight = true;
  try { await fetchOrderbook(); }
  finally { fetchInFlight = false; }
}
safeFetch();
setInterval(safeFetch, 100);
</script>

</body>
</html>
