<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDT Live — OTE</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1a1a; --muted:#8a8a8a;
    --line:#e4e4e4; --hour-bg:#f4f4f4;
    --bid:#0b8a3e; --bid-bg:#eafaf0;
    --ask:#c0392b; --ask-bg:#fdeeec;
    --stale:#bbb; --live:#0b8a3e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'SF Mono',Menlo,Consolas,'DejaVu Sans Mono',monospace;
    font-size:13px; padding:14px;
  }
  header{
    display:flex; align-items:center; gap:14px;
    margin-bottom:12px; flex-wrap:wrap;
  }
  h1{font-size:15px; font-weight:700; letter-spacing:.5px}
  .status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--stale)}
  .dot.live{background:var(--live); box-shadow:0 0 0 0 rgba(11,138,62,.5); animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(11,138,62,.5)}70%{box-shadow:0 0 0 6px rgba(11,138,62,0)}100%{box-shadow:0 0 0 0 rgba(11,138,62,0)}}
  .meta{font-size:11px; color:var(--muted)}
  table{border-collapse:collapse; width:100%; max-width:1000px}
  th{
    text-align:right; font-size:10px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:.6px;
    padding:6px 10px; border-bottom:2px solid var(--line);
  }
  th.l{text-align:left}
  td{padding:4px 10px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap}
  td.l{text-align:left}
  tr.hour{background:var(--hour-bg); font-weight:700}
  tr.hour td{border-bottom:1px solid #d8d8d8}
  tr.qh td.l{padding-left:26px; color:#555; font-weight:400}
  .bid{color:var(--bid)}
  .ask{color:var(--ask)}
  .bidcell{background:var(--bid-bg)}
  .askcell{background:var(--ask-bg)}
  .dim{color:var(--muted)}
  .flash{animation:f .6s ease}
  @keyframes f{0%{background:#fff8c5}100%{}}
  .err{color:var(--ask); font-size:12px; margin-top:8px; max-width:900px}
  .qtys{font-size:10px; color:var(--muted)}
  /* oddeleni panelu VDT | DT */
  .sep{border-left:3px solid #c9c9c9 !important}
  th.dthead{color:#2a4d8f}
  td.dtcell{background:#f3f6fc}
  tr.hour td.dtcell{background:#e7eefb}
  .diff-pos{color:#0b8a3e}
  .diff-neg{color:#c0392b}
  .panel-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
</style>
</head>
<body>
  <header>
    <h1>VDT LIVE</h1>
    <div class="status"><span id="dot" class="dot"></span><span id="state">připojuji…</span></div>
    <div class="meta" id="date" style="font-weight:700;color:var(--ink)"></div>
    <div class="meta" id="meta"></div>
  </header>

  <table id="tbl">
    <thead>
      <tr>
        <th class="l"></th>
        <th class="panel-label" colspan="4" style="text-align:center;color:var(--bid)">VDT (live)</th>
        <th class="panel-label sep dthead" colspan="2" style="text-align:center">DT spot</th>
        <th class="dthead"></th>
      </tr>
      <tr>
        <th class="l">Kontrakt</th>
        <th>Bid</th>
        <th>Ask</th>
        <th>Last</th>
        <th>Spread</th>
        <th class="sep dthead">DT</th>
        <th class="dthead">VDT−DT</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td class="l dim" colspan="8">čekám na data z bota…</td></tr>
    </tbody>
  </table>
  <div class="err" id="err"></div>

<script>
// cte z tveho server.py (Render) - stejny origin, zadny mixed-content problem
const BASE = (location.origin.startsWith("http") && location.origin !== "null")
  ? location.origin : "https://ceps-live2.onrender.com";
const ENDPOINT = BASE + "/vdt/orderbook";
const REFRESH  = 1000; // ms
let prev = {};
// DT spot ceny: dtHour[h] = EUR/MWh, dtQH["HH:MM"] = EUR/MWh
let dtHour = {};
let dtQH = {};
let dtLoaded = false;

const fmt = (v) => (v===null||v===undefined) ? '–' : (typeof v==='number'? v.toFixed(2) : v);
const fmtq = (v) => (v===null||v===undefined||v===0) ? '' : v;

// nacti DT spot ceny (hodinove + QH). Meni se 1x denne -> staci obcas.
async function loadDT(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const today = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  // hodinove z /ote/spot
  try{
    const r = await fetch(BASE+"/ote/spot", {cache:'no-store'});
    if(r.ok){
      const d = await r.json();
      const ht = d.hours_today || d.hoursToday || [];
      dtHour = {};
      for(const p of ht){
        const v = (p.priceEur ?? p.priceEUR ?? p.price_eur);
        if(Number.isFinite(v)) dtHour[p.hour] = v;
      }
    }
  }catch(e){ console.warn('DT hour:', e); }
  // QH z /spot/prices
  try{
    const r2 = await fetch(BASE+`/spot/prices?country=CZ&date=${today}`, {cache:'no-store'});
    if(r2.ok){
      const d2 = await r2.json();
      dtQH = {};
      if(d2.data) for(const p of d2.data){
        if(Number.isFinite(p.price_eur))
          dtQH[`${pad(p.hour)}:${pad(p.minute)}`] = p.price_eur;
      }
    }
  }catch(e){ console.warn('DT qh:', e); }
  dtLoaded = true;
}

function render(rows){
  if(!rows || rows.length===0){
    document.getElementById('rows').innerHTML =
      '<tr><td class="l dim" colspan="8">žádné kontrakty (trh možná zavřený / bot neposílá)</td></tr>';
    return;
  }

  // dnesni datum YYYYMMDD (prazsky cas)
  const now = new Date();
  const off = (now.getUTCMonth()>=3 && now.getUTCMonth()<=9) ? 2 : 1;
  const prg = new Date(now.getTime() + off*3600*1000);
  const TODAY = prg.getUTCFullYear().toString()
    + String(prg.getUTCMonth()+1).padStart(2,'0')
    + String(prg.getUTCDate()).padStart(2,'0');

  // jen dnesni dodavka + seskup podle hodiny; H = hlavni radek, QH pod nim
  const groups = {};
  for(const row of rows){
    const k = row.kontrakt || {};
    if(k.date && k.date !== TODAY) continue;     // jen dnesek
    const frm = k.from || "99:99";
    const hh = parseInt((frm.split(":")[0]||"99"),10);
    if(isNaN(hh) || hh>23) continue;
    groups[hh] = groups[hh] || {hour:hh, hourRow:null, qh:[]};
    if(k.type === "H") groups[hh].hourRow = row;
    else groups[hh].qh.push(row);
  }

  const hours = Object.keys(groups).map(Number).sort((a,b)=>a-b);
  // datum do hlavicky (z TODAY YYYYMMDD -> DD.MM.YYYY)
  document.getElementById('date').textContent =
    TODAY.slice(6,8)+'.'+TODAY.slice(4,6)+'.'+TODAY.slice(0,4);
  if(hours.length===0){
    document.getElementById('rows').innerHTML =
      '<tr><td class="l dim" colspan="8">žádná dnešní data</td></tr>';
    return;
  }
  let html = '';

  const cell = (row, dtPrice) => {
    const sp = row.spread;
    // VDT referencni cena pro porovnani s DT: last, jinak mid (bid+ask)/2
    let vdtRef = row.last;
    if(vdtRef===null||vdtRef===undefined){
      if(row.bid!=null && row.ask!=null) vdtRef = (row.bid+row.ask)/2;
    }
    let diff = null;
    if(vdtRef!=null && dtPrice!=null) diff = vdtRef - dtPrice;
    const diffCls = diff==null ? 'dim' : (diff>=0 ? 'diff-pos' : 'diff-neg');
    const diffStr = diff==null ? '–' : (diff>=0?'+':'')+diff.toFixed(2);
    return `
      <td class="bidcell"><span class="bid">${fmt(row.bid)}</span></td>
      <td class="askcell"><span class="ask">${fmt(row.ask)}</span></td>
      <td>${fmt(row.last)}</td>
      <td class="${sp!==null&&sp!==undefined?'':'dim'}">${fmt(sp)}</td>
      <td class="sep dtcell">${fmt(dtPrice)}</td>
      <td class="dtcell ${diffCls}">${diffStr}</td>
      <td></td>`;
  };

  const keyOf = (row) => (row.kontrakt && row.kontrakt.raw) || JSON.stringify(row);
  const flashCls = (row) => {
    const id = keyOf(row); const p = prev[id]; let f='';
    if(p && (p.bid!==row.bid || p.ask!==row.ask || p.last!==row.last)) f=' flash';
    prev[id] = {bid:row.bid, ask:row.ask, last:row.last};
    return f;
  };

  for(const h of hours){
    const g = groups[h];
    const label = String(h).padStart(2,'0')+':00–'+String((h+1)%24).padStart(2,'0')+':00';
    const dtH = dtHour[h] ?? null;
    if(g.hourRow){
      html += `<tr class="hour${flashCls(g.hourRow)}"><td class="l">${label}</td>${cell(g.hourRow, dtH)}</tr>`;
    } else {
      const dtStr = dtH!=null ? dtH.toFixed(2) : '—';
      html += `<tr class="hour"><td class="l">${label}</td><td colspan="4" class="dim">—</td><td class="sep dtcell">${dtStr}</td><td class="dtcell dim">–</td><td></td></tr>`;
    }
    g.qh.sort((a,b)=>((a.kontrakt&&a.kontrakt.from)||'').localeCompare((b.kontrakt&&b.kontrakt.from)||''));
    for(const q of g.qh){
      const frm = (q.kontrakt && q.kontrakt.from) || '?';
      let qlabel = frm;
      const mm = frm.match(/^(\d{2}):(\d{2})$/);
      if(mm){
        let hh=parseInt(mm[1],10), mi=parseInt(mm[2],10)+15;
        if(mi>=60){ mi-=60; hh=(hh+1)%24; }
        qlabel = frm+'-'+String(hh).padStart(2,'0')+':'+String(mi).padStart(2,'0');
      }
      const dtQ = dtQH[frm] ?? null;
      html += `<tr class="qh${flashCls(q)}"><td class="l">${qlabel}</td>${cell(q, dtQ)}</tr>`;
    }
  }

  document.getElementById('rows').innerHTML = html;
}

async function tick(){
  const dot = document.getElementById('dot');
  const state = document.getElementById('state');
  const err = document.getElementById('err');
  try{
    const res = await fetch(ENDPOINT, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const rows = data.rows || [];
    render(rows);
    dot.className = 'dot live';
    state.textContent = 'živě';
    err.textContent = '';
    document.getElementById('meta').textContent =
      (data.total_kontraktu||rows.length)+' kontraktů · '+
      (data.latest_ts? ('aktualizace '+data.latest_ts) : '');
  }catch(e){
    dot.className = 'dot';
    state.textContent = 'odpojeno';
    err.textContent = 'Nelze načíst '+ENDPOINT+' — běží ote_bot.py a posílá na /ingest? ('+e.message+')';
  }
}
loadDT();                       // DT spot ceny hned
setInterval(loadDT, 5*60*1000); // DT obnovuj kazdych 5 min (meni se 1x denne)
tick();
setInterval(tick, REFRESH);
</script>
</body>
</html>
